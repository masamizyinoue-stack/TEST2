const HL_COLORS = [
  {id:'sw0', c:'#ffd700'},
  {id:'sw1', c:'#50c040'},
  {id:'sw2', c:'#ff69b4'},
  {id:'sw3', c:'#40d4e8'},
];

/* ツール別デフォルト太さ */
const TOOL_DEFAULT_SIZES = {
  pen:3, hl:3, eraser:20, text:3,   // [THIN2] defaults は元に戻し、lw/3 で細さ調整
  arrow:2, rect:2, circle:2, line:2
};

/* ============================================================
   グローバル状態
   ============================================================ */
let currentTool  = 'pen';
let prevTool     = 'pen';
let currentShape = 'arrow';
let selMode      = 'rect';
let strokeColor  = '#cc2020';
let strokeSize   = 3;
let penColor     = '#cc2020';
let hlColor      = '#ffd700';
let txX = 0, txY = 0;

const subWindows  = [];
let   swZIndex    = 200;
const betsuWindows = []; // 別窓インスタンス管理
let   bwZIndex    = 220; // 別窓 z-index (SubWin より前面)
let   _fileHandle = null;


/* ツール別太さ (実行中に変更される) */
const toolSizes = { ...TOOL_DEFAULT_SIZES };

/* ============================================================
   IDB (IndexedDB ラッパー)
   ============================================================ */
const IDB = {
  _db: null,
  async open() {
    if (this._db) return this._db;
    return this._db = await new Promise((res, rej) => {
      const req = indexedDB.open('TekkoV11', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('d');
      req.onsuccess       = e => res(e.target.result);
      req.onerror         = e => rej(e.target.error);
    });
  },
  async get(key) {
    try {
      const db = await this.open();
      return await new Promise(res => {
        const q = db.transaction('d','readonly').objectStore('d').get(key);
        q.onsuccess = e => res(e.target.result ?? null);
        q.onerror   = () => res(null);
      });
    } catch { return null; }
  },
  async set(key, val) {
    try {
      const db = await this.open();
      await new Promise((res, rej) => {
        const q = db.transaction('d','readwrite').objectStore('d').put(val, key);
        q.onsuccess = res;
        q.onerror   = rej;
      });
    } catch(e) { console.warn('IDB:', e); }
  }
};

function safeKey(s) {
  return s.replace(/[^a-zA-Z0-9._-]/g, '_').substring(0, 100);
}

let _autoSaveTimer;
/** IDB 保存・復元時に eraser ストロークを除去（蓄積による freeze 防止） */
function _pruneEraserStrokes(strks) {
  const result = {};
  for (const [pg, arr] of Object.entries(strks || {})) {
    const filtered = (arr || []).filter(s => s.type !== 'eraser');
    if (filtered.length) result[pg] = filtered;
  }
  return result;
}

function schedSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(async () => {
    if (!App.pdfDoc || !App.origBuf) return;
    // eraser ストロークを保存しない（IDB 蓄積 → 復元後の freeze 防止）
    const rawStrokes = App.strokes;
    const cleanStrokes = {};
    for (const [pg, arr] of Object.entries(rawStrokes || {})) {
      const filtered = (arr || []).filter(s => s.type !== 'eraser');
      if (filtered.length) cleanStrokes[pg] = filtered;
    }
    const data = {
      buf:     App.origBuf.slice(0),
      file:    App.fileName,
      strokes: (typeof structuredClone === 'function'
                  ? structuredClone(cleanStrokes)
                  : JSON.parse(JSON.stringify(cleanStrokes))),
      page:    App.currentPage,
      scale:   App.scale,
      ts:      Date.now()
    };
    await IDB.set('last', data);
    await IDB.set('f:' + safeKey(App.fileName), data);
  }, SAVE_DELAY);
}

/* ============================================================
   描画ユーティリティ
   invEZ = 1/cssExtraZoom → lineWidth を CSS px 固定にする補正値
   ============================================================ */

/**
 * midpoint Bezier で滑らかな曲線を描く (ライブ描画用・最後の3点分)
 * @param {CanvasRenderingContext2D} ctx
 * @param {number[][]} pts  全点配列
 * @param {number[]}   cur  最新点 [x, y]
 * @param {number}     sc   スケール
 */
function drawLiveBezierSegment(ctx, pts, cur, sc) {
  if (pts.length >= 3) {
    const pp = pts[pts.length - 3];
    const cp = pts[pts.length - 2];
    const pmx = (pp[0] + cp[0]) / 2 * sc;
    const pmy = (pp[1] + cp[1]) / 2 * sc;
    const cmx = (cp[0] + cur[0]) / 2 * sc;
    const cmy = (cp[1] + cur[1]) / 2 * sc;
    ctx.moveTo(pmx, pmy);
    ctx.quadraticCurveTo(cp[0] * sc, cp[1] * sc, cmx, cmy);
  } else if (pts.length >= 2) {
    const prev = pts[pts.length - 2];
    ctx.moveTo(prev[0] * sc, prev[1] * sc);
    ctx.lineTo(cur[0] * sc, cur[1] * sc);
  }
}

/**
 * ストローク1本を描画する
 * @param {object} s    ストロークオブジェクト
 * @param {CanvasRenderingContext2D} ctx
 * @param {number} sc   スケール
 * @param {number} invEZ 1/cssExtraZoom (省略時=1)
 */
// [FIX-ZOOM-SIZE] invEZ は PDF保存呼出し互換のため残すが不使用。lw は sc 比例に統一
function drawStroke(s, ctx, sc, invEZ = 1) {
  ctx.save();
  const lw = s.size * sc / 3; // [THIN2] /3 で約1/3の細さに統一（ズーム比例は維持）

  if (s.type === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = lw * 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    s.points.forEach((p, i) => i ? ctx.lineTo(p[0]*sc, p[1]*sc) : ctx.moveTo(p[0]*sc, p[1]*sc));
    ctx.stroke();

  } else if (s.type === 'pen' || s.type === 'hl') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha   = s.type === 'hl' ? 0.38 : 1;
    ctx.strokeStyle   = s.color;
    ctx.lineWidth     = s.type === 'hl' ? Math.max(lw * 4, 5 * sc / 3) : lw; // [THIN2] HL最小幅も /3
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const pts = s.points;
    if (pts && pts.length) {
      ctx.beginPath();
      ctx.moveTo(pts[0][0] * sc, pts[0][1] * sc);
      for (let i = 1; i < pts.length - 1; i++) {
        const mx = (pts[i][0] + pts[i+1][0]) / 2 * sc;
        const my = (pts[i][1] + pts[i+1][1]) / 2 * sc;
        ctx.quadraticCurveTo(pts[i][0]*sc, pts[i][1]*sc, mx, my);
      }
      if (pts.length > 1) ctx.lineTo(pts[pts.length-1][0]*sc, pts[pts.length-1][1]*sc);
      ctx.stroke();
    }

  } else if (s.type === 'text') {
    ctx.fillStyle = s.color;
    ctx.font = `bold ${Math.round(s.size * 6 * sc)}px 'Helvetica Neue',Arial,sans-serif`; // [FIX-ZOOM-SIZE]
    s.text.split('\n').forEach((line, i) =>
      ctx.fillText(line, s.x * sc, s.y * sc + i * s.size * 7 * sc)); // [FIX-ZOOM-SIZE]

  } else {
    ctx.strokeStyle = s.color; ctx.lineWidth = lw; ctx.lineCap = 'round';
    const [x1, y1, x2, y2] = [s.x1*sc, s.y1*sc, s.x2*sc, s.y2*sc];
    if (s.type === 'rect') {
      ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    } else if (s.type === 'circle') {
      const rx = (x2-x1)/2, ry = (y2-y1)/2;
      ctx.beginPath(); ctx.ellipse(x1+rx, y1+ry, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI*2); ctx.stroke();
    } else if (s.type === 'line') {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    } else if (s.type === 'arrow') {
      const hl  = Math.max(lw * 4, 12 * sc); // [FIX-ZOOM-SIZE] 矢印頭もscベース
      const ang = Math.atan2(y2-y1, x2-x1);
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - hl*Math.cos(ang-Math.PI/6), y2 - hl*Math.sin(ang-Math.PI/6));
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - hl*Math.cos(ang+Math.PI/6), y2 - hl*Math.sin(ang+Math.PI/6));
      ctx.stroke();
    }
  }
  ctx.restore();
}

/**
 * ② アノテーション描画
 *    eraser ストロークは endDraw 時に即時削除するため配列に残らない
 *    → 常に単純描画パス（temp canvas 生成ゼロ・compositing なし）
 */
function _drawAnnotations(ctx, strks, sc) {
  if (!strks || !strks.length) return;
  strks.forEach(s => drawStroke(s, ctx, sc));
}

/**
 * 消しゴム処理 (全消去対象タイプ対応版)
 *   pen/hl → _applyEraser で部分消去（ポイント削除）
 *   line/rect/circle/arrow → バウンディングボックス接触で図形全体を削除
 *   text → 削除しない
 * eraser ストロークは配列に保存せず即時削除 → compositing 不要 → redraw() が軽量
 */
function _applyEraserAll(stroke, erPts, hitR) {
  if (stroke.type === 'text') return [stroke]; // text は消去しない
  // pen / hl : ポイント単位の部分消去
  if ((stroke.type === 'pen' || stroke.type === 'hl') && stroke.points?.length) {
    return _applyEraser(stroke, erPts, hitR);
  }
  // 図形 (line/rect/circle/arrow) : バウンディングボックス接触で全体削除
  const bb = strokeBBox(stroke);
  if (!bb) return [stroke];
  // 消しゴム点列のいずれかが BB+hitR 内に入るか、BB中心への線分距離が範囲内なら削除
  for (let i = 0; i < erPts.length; i++) {
    const [ex, ey] = erPts[i];
    if (ex >= bb.x1 - hitR && ex <= bb.x2 + hitR &&
        ey >= bb.y1 - hitR && ey <= bb.y2 + hitR) return []; // 点がBBに接触
    if (i > 0) {
      const cx = (bb.x1 + bb.x2) / 2, cy = (bb.y1 + bb.y2) / 2;
      const reach = hitR + Math.hypot(bb.x2 - bb.x1, bb.y2 - bb.y1) / 2;
      if (_distPtSeg(cx, cy, erPts[i-1][0], erPts[i-1][1], ex, ey) < reach) return []; // 線分がBBに近い
    }
  }
  return [stroke]; // 接触なし → 保持
}

/**
 * 消しゴム円内のポイントだけ除去し、残存部分を別ストロークとして返す（部分消去）
 * stroke全体削除ではなく「カーソル範囲内のポイントのみ」を消すことで当たり判定を正確化
 * @param {object}   penStroke - ペンストローク {points:[[x,y],...], size, ...}
 * @param {number[][]} erPts   - 消しゴム経路の座標列 (PDF座標)
 * @param {number}   hitR      - ヒット半径 (PDF座標単位) ← 視覚カーソル半径と完全一致させること
 * @returns {object[]}         - 残存セグメント配列（0個以上）
 */

/** ペン点pから消しゴム線分a→bへの最短距離 (PDF座標) */
function _distPtSeg(px, py, ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay, len2 = dx*dx+dy*dy;
  if (len2 === 0) return Math.hypot(px-ax, py-ay);
  const t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}

function _applyEraser(penStroke, erPts, hitR) {
  // 各ペンポイントと消しゴム【線分】の最短距離で判定（点列のみより高精度）
  const kept = penStroke.points.map(pp => {
    const px = pp[0], py = pp[1];
    if (erPts.length === 0) return pp;
    // 1点目: 点との距離
    if (Math.hypot(px-erPts[0][0], py-erPts[0][1]) < hitR) return null;
    // 2点目以降: 各線分との最短距離
    for (let i = 1; i < erPts.length; i++) {
      if (_distPtSeg(px, py, erPts[i-1][0], erPts[i-1][1], erPts[i][0], erPts[i][1]) < hitR)
        return null;
    }
    return pp;
  });
  // 連続する保持ポイントをセグメントに分割（消去ポイントで切断）
  const result = [];
  let seg = [];
  for (const p of kept) {
    if (p !== null) {
      seg.push(p);
    } else {
      if (seg.length >= 2) result.push({ ...penStroke, points: [...seg] });
      seg = [];
    }
  }
  if (seg.length >= 2) result.push({ ...penStroke, points: [...seg] });
  return result;
}

/**
 * ストロークのバウンディングボックスを返す
 */
function strokeBBox(s) {
  if (!s || s.type === 'eraser') return null;
  if (s.points) {
    const xs = s.points.map(p => p[0]), ys = s.points.map(p => p[1]);
    return { x1: Math.min(...xs), y1: Math.min(...ys), x2: Math.max(...xs), y2: Math.max(...ys) };
  }
  if (s.type === 'text') {
    return { x1: s.x-2, y1: s.y-s.size*8, x2: s.x+s.size*4*(s.text?.length||1), y2: s.y+4 };
  }
  return { x1: Math.min(s.x1,s.x2), y1: Math.min(s.y1,s.y2), x2: Math.max(s.x1,s.x2), y2: Math.max(s.y1,s.y2) };
}

/**
 * 点(px,py)がポリゴン内にあるか (なげなわ選択用)
 */
function ptInPoly(px, py, poly) {
  let inside = false;
  for (let i = 0, j = poly.length-1; i < poly.length; j = i++) {
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    if (((yi > py) !== (yj > py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}

/* ============================================================
   ページ回転補正 (PDF保存用)
   PDF Rotate=R は「表示時に R°CW 回転する」の意味。
   pdf.js は Rotate 分を適用済みの display canvas を生成する。
   保存時は display→native 変換を適用してネイティブ座標系に戻す。
   数学的根拠 (canvas y-down, native WxH → display):
     rot=90 : native(x,y)→display(ph-y, x)  逆変換: display(X,Y)→native(Y, ph-X)
              → translate(0, ph*rs) + rotate(-π/2)
     rot=180: native(x,y)→display(pw-x,ph-y) 逆変換: translate(pw,ph) + rotate(π)
     rot=270: native(x,y)→display(y, pw-x)   逆変換: display(X,Y)→native(pw-Y, X)
              → translate(pw*rs, 0) + rotate(+π/2)
   ============================================================ */
function rotateCanvas(src, jsPage, pw, ph, rs) {
  const rot = jsPage.rotate || 0;
  if (!rot) return src;
  const dc = document.createElement('canvas');
  dc.width = Math.round(pw * rs); dc.height = Math.round(ph * rs);
  const ctx = dc.getContext('2d');
  if      (rot === 90)  { ctx.translate(0,      ph*rs); ctx.rotate(-Math.PI / 2); } // 90°CCW (display→native)
  else if (rot === 180) { ctx.translate(pw*rs, ph*rs);  ctx.rotate( Math.PI);     } // 180°   (unchanged)
  else if (rot === 270) { ctx.translate(pw*rs, 0);      ctx.rotate( Math.PI / 2); } // 90°CW  (display→native)
  ctx.drawImage(src, 0, 0);
  return dc;
}

/* ============================================================
   サブウィンドウ
   ============================================================ */
class SubWin {
  constructor(pdfDoc, strokes, pageNum, region, screenX, screenY, initScale) {
    this.pdfDoc     = pdfDoc;
    this.strokes    = strokes;
    this.pageNum    = pageNum;
    this.innerScale = Math.max(0.2, Math.min(8, initScale || 1));
    this.offX       = region.x1;
    this.offY       = region.y1;

    const rW = region.x2 - region.x1;
    const rH = region.y2 - region.y1;
    this.winW = Math.max(180, Math.round(rW * this.innerScale) + 4);
    this.winH = Math.max(160, Math.round(rH * this.innerScale) + 30);
    this.sx   = Math.max(4, Math.min(window.innerWidth  - this.winW - 10, screenX));
    this.sy   = Math.max(4, Math.min(window.innerHeight - this.winH - 10, screenY));

    this.pinch     = null; this.panSt    = null;
    this.curStroke = null; this.isDrawing = false;
    this.lastX = 0; this.lastY = 0;

    this._renderVer  = 0;
    this._pdfCache   = null; this._pdfCacheSc = 0; this._pdfCachePg = 0;
    this._annCvs     = null; this._annDirty   = true;
    this._cleanups   = [];

    const idx      = subWindows.length;
    this.swColor   = SW_COLORS[idx % MAX_SUBWIN];
    this.swFill    = SW_FILLS [idx % MAX_SUBWIN];

    this._build();
    this.render();
  }

  _build() {
    const el = document.createElement('div');
    el.className = 'swn';
    el.style.cssText = `left:${this.sx}px;top:${this.sy}px;width:${this.winW}px;height:${this.winH}px;z-index:${++swZIndex};border-color:${this.swColor}`;

    const n = subWindows.length + 1;
    el.innerHTML = `
      <div class="swn-tb">
        <span>🔍 サブ窓${n}</span>
        <button class="swn-close">✕</button>
      </div>
      <div class="swn-body">
        <canvas class="swn-cvs"></canvas>
        <canvas class="swn-sel" style="position:absolute;top:0;left:0;pointer-events:none;z-index:5"></canvas>
        <span class="swn-zl"></span>
      </div>
      <div class="swn-rz"></div>
      <div class="swn-rz-sw"></div>
      <div class="swn-rz-nw"></div>`;

    this.el      = el;
    this.body    = el.querySelector('.swn-body');
    this.cvs     = el.querySelector('.swn-cvs');
    this.ctx     = this.cvs.getContext('2d');
    this.selCvs  = el.querySelector('.swn-sel');
    this.selCtx  = this.selCvs.getContext('2d');
    this.zlEl    = el.querySelector('.swn-zl');

    el.querySelector('.swn-close').addEventListener('pointerdown', e => {
      e.stopPropagation(); this.close();
    });
    el.addEventListener('pointerdown', () => { el.style.zIndex = ++swZIndex; },
      { capture: true, passive: true });

    this._bindDrag  (el.querySelector('.swn-tb'));
    this._bindResize(el.querySelector('.swn-rz'),    'se'); // 右下（既存）
    this._bindResize(el.querySelector('.swn-rz-sw'), 'sw'); // 左下（追加）
    this._bindResize(el.querySelector('.swn-rz-nw'), 'nw'); // 左上（追加）
    this._bindInput();

    document.body.appendChild(el);
  }

  _bodyRect() { return this.body.getBoundingClientRect(); }
  _toDocPos(t) {
    const r = this._bodyRect();
    return { x: (t.clientX - r.left) / this.innerScale + this.offX,
             y: (t.clientY - r.top)  / this.innerScale + this.offY };
  }
  _updateTransform() {
    this.cvs.style.transform =
      `translate(${-this.offX * this.innerScale}px,${-this.offY * this.innerScale}px)`;
    App.redrawSelOv?.();
  }

  /* レンダリング (2層合成: PDF + アノテーション) */
  async render() {
    if (!this.pdfDoc) return;
    const ver = ++this._renderVer;
    const sc  = this.innerScale;
    const page = await this.pdfDoc.getPage(this.pageNum);
    const vp   = page.getViewport({ scale: sc });

    // PDFキャッシュ
    if (!this._pdfCache || this._pdfCacheSc !== sc || this._pdfCachePg !== this.pageNum) {
      const offscr = document.createElement('canvas');
      offscr.width = vp.width; offscr.height = vp.height;
      const ctx = offscr.getContext('2d');
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, vp.width, vp.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      this._pdfCache = offscr; this._pdfCacheSc = sc; this._pdfCachePg = this.pageNum;
    }

    // アノテーションキャッシュ
    const needAnn = this._annDirty || !this._annCvs
      || this._annCvs.width !== vp.width || this._annCvs.height !== vp.height;
    if (needAnn) {
      if (!this._annCvs) this._annCvs = document.createElement('canvas');
      this._annCvs.width = vp.width; this._annCvs.height = vp.height;
      const actx = this._annCvs.getContext('2d');
      actx.clearRect(0, 0, vp.width, vp.height);
      _drawAnnotations(actx, this.strokes[this.pageNum] || [], sc); // ② 消しゴムは text 以外すべて対象
      this._annDirty = false;
    }

    if (ver !== this._renderVer) return;
    this.cvs.width = vp.width; this.cvs.height = vp.height;
    this.cvs.style.width = vp.width + 'px'; this.cvs.style.height = vp.height + 'px';
    this.ctx.clearRect(0, 0, vp.width, vp.height);
    this.ctx.drawImage(this._pdfCache, 0, 0);
    this.ctx.drawImage(this._annCvs,  0, 0);
    this._updateTransform();
    this.zlEl.textContent = Math.round(sc * 100) + '%';
  }

  /* 入力バインド */
  _bindInput() {
    const cv = this.cvs;
    const isStylus = t => (t.touchType === 'stylus' || t.touchType == null);

    cv.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      if (e.touches.length >= 2) { this.panSt = null; this._startPinch(e.touches); return; }
      const t = e.touches[0];
      const needPen = ['pen','hl'].includes(currentTool === 'shape' ? currentShape : currentTool);
      if ((needPen && !isStylus(t)) || ['sub','select'].includes(currentTool)) {
        this._startPan(t); return;
      }
      this._startDraw(t);
    }, { passive: false });

    cv.addEventListener('touchmove', e => {
      e.preventDefault(); e.stopPropagation();
      if (e.touches.length >= 2 && this.pinch) { this._movePinch(e.touches); return; }
      if (this.panSt)    { this._movePan(e.touches[0]); return; }
      if (this.isDrawing) this._moveDraw(e.touches[0]);
    }, { passive: false });

    cv.addEventListener('touchend', e => {
      e.stopPropagation();
      if (this.pinch && e.touches.length < 2) { this._endPinch(); return; }
      if (this.panSt)     { this.panSt = null; return; }
      if (this.isDrawing)   this._endDraw();
    });

    cv.addEventListener('wheel', e => {
      e.preventDefault(); e.stopPropagation();
      const r  = e.deltaY < 0 ? 1.15 : 0.87;
      const br = this._bodyRect();
      const bx = e.clientX - br.left, by = e.clientY - br.top;
      const pdfX = bx / this.innerScale + this.offX;
      const pdfY = by / this.innerScale + this.offY;
      const newSc = Math.max(0.2, Math.min(8, this.innerScale * r));
      this.offX = pdfX - bx / newSc; this.offY = pdfY - by / newSc;
      this.innerScale = newSc;
      this._pdfCache = null; this.render();
    }, { passive: false });
  }

  /* ピンチ */
  _pinchDist(t) { const dx = t[1].clientX-t[0].clientX, dy = t[1].clientY-t[0].clientY; return Math.sqrt(dx*dx+dy*dy); }
  _pinchMid(t)  { return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 }; }

  _startPinch(t) {
    const m = this._pinchMid(t), br = this._bodyRect();
    const bx = m.x - br.left, by = m.y - br.top;
    this.pinch = {
      d0: this._pinchDist(t), s0: this.innerScale,
      pdfX: bx / this.innerScale + this.offX,
      pdfY: by / this.innerScale + this.offY
    };
  }
  _movePinch(t) {
    const p = this.pinch, r = this._pinchDist(t) / p.d0;
    const m = this._pinchMid(t), br = this._bodyRect();
    p.lastMx = m.x - br.left; p.lastMy = m.y - br.top;
    p.target = Math.max(0.2, Math.min(8, p.s0 * r));
    const tx = p.lastMx - p.pdfX * p.target;
    const ty = p.lastMy - p.pdfY * p.target;
    const cssR = p.target / p.s0;
    this.cvs.style.transformOrigin = '0 0';
    this.cvs.style.transform = `translate(${tx}px,${ty}px) scale(${cssR})`;
    this.zlEl.textContent = Math.round(p.target * 100) + '%';
  }
  _endPinch() {
    if (!this.pinch) return;
    const p = this.pinch; this.pinch = null;
    this.innerScale = p.target;
    if (p.lastMx !== undefined) {
      this.offX = p.pdfX - p.lastMx / p.target;
      this.offY = p.pdfY - p.lastMy / p.target;
    }
    this.cvs.style.transform = '';
    this._pdfCache = null; this.render();
  }

  /* パン */
  _startPan(t) { this.panSt = { x0: t.clientX, y0: t.clientY, ox0: this.offX, oy0: this.offY }; }
  _movePan(t) {
    if (!this.panSt) return;
    this.offX = this.panSt.ox0 - (t.clientX - this.panSt.x0) / this.innerScale;
    this.offY = this.panSt.oy0 - (t.clientY - this.panSt.y0) / this.innerScale;
    this._updateTransform();
  }

  /* 描画 */
  _startDraw(t) {
    const p = this._toDocPos(t);
    if (currentTool === 'text') {
      txX = p.x; txY = p.y;
      document.getElementById('txfld').value = '';
      document.getElementById('txov').classList.add('on');
      return;
    }
    this.isDrawing = true; this.lastX = p.x; this.lastY = p.y;
    const tool = currentTool === 'shape' ? currentShape : currentTool;
    this.curStroke = ['pen','hl','eraser'].includes(tool)
      ? { type: tool, points: [[p.x, p.y]], color: strokeColor, size: strokeSize }
      : { type: tool, x1: p.x, y1: p.y, x2: p.x, y2: p.y, color: strokeColor, size: strokeSize };
  }
  _moveDraw(t) {
    if (!this.curStroke) return;
    const p = this._toDocPos(t);
    const s = this.curStroke;
    const sc = this.innerScale;

    if (['pen','hl'].includes(s.type)) {
      s.points.push([p.x, p.y]);
      this.ctx.save();
      this.ctx.globalCompositeOperation = 'source-over';
      this.ctx.globalAlpha  = s.type === 'hl' ? 0.38 : 1;
      this.ctx.strokeStyle  = s.color;
      this.ctx.lineWidth    = s.type === 'hl' ? Math.max(s.size*4, 5) * sc / 3 : s.size * sc / 3; // [THIN2]
      this.ctx.lineCap = 'round'; this.ctx.lineJoin = 'round';
      this.ctx.beginPath();
      drawLiveBezierSegment(this.ctx, s.points, [p.x, p.y], sc);
      this.ctx.stroke(); this.ctx.restore();
      this.lastX = p.x; this.lastY = p.y;

    } else if (s.type === 'eraser') {
      s.points.push([p.x, p.y]); this.lastX = p.x; this.lastY = p.y;
      const br = this._bodyRect();
      if (this.selCvs.width  !== Math.round(br.width) ||
          this.selCvs.height !== Math.round(br.height)) {
        this.selCvs.width  = Math.round(br.width);
        this.selCvs.height = Math.round(br.height);
      } else {
        this.selCtx.clearRect(0, 0, this.selCvs.width, this.selCvs.height);
      }
      const bx = (p.x - this.offX) * this.innerScale;
      const by = (p.y - this.offY) * this.innerScale;
      this.selCtx.save();
      this.selCtx.strokeStyle = '#888'; this.selCtx.lineWidth = 1.5;
      this.selCtx.setLineDash([4, 2]);
      this.selCtx.beginPath(); this.selCtx.arc(bx, by, s.size * 2 * sc / 3, 0, Math.PI*2); this.selCtx.stroke(); // [THIN2]
      this.selCtx.restore();

    } else {
      s.x2 = p.x; s.y2 = p.y;
      clearTimeout(this._drawTimer);
      this._drawTimer = setTimeout(() => this.render(), 30);
    }
  }
  _endDraw() {
    if (!this.isDrawing || !this.curStroke) { this.isDrawing = false; return; }
    this.isDrawing = false;
    if (!this.strokes[this.pageNum]) this.strokes[this.pageNum] = [];
    const s = this.curStroke;
    if (s.type === 'eraser') {
      // 全タイプを即時削除・eraser を配列に保存しない
      const r = (s.size || 20) * 2 / 3, erPts = s.points || [];
      this.strokes[this.pageNum] = (this.strokes[this.pageNum] || [])
        .flatMap(st => _applyEraserAll(st, erPts, r));
    } else {
      this.strokes[this.pageNum].push({ ...s, points: s.points ? [...s.points] : undefined });
    }
    this.curStroke = null; this._annDirty = true;
    if (this.selCvs) this.selCtx.clearRect(0, 0, this.selCvs.width, this.selCvs.height);
    this.render(); App.redraw(); schedSave();
  }

  /* ドラッグ (ウィンドウ移動) */
  _bindDrag(handle) {
    let dragging = false, ox = 0, oy = 0, ex = 0, ey = 0;
    const onStart = e => {
      if (e.target.closest('.swn-close')) return;
      dragging = true;
      const s = e.touches ? e.touches[0] : e;
      ox = s.clientX; oy = s.clientY;
      const r = this.el.getBoundingClientRect(); ex = r.left; ey = r.top;
      e.preventDefault();
    };
    const onMove = e => {
      if (!dragging) return;
      const s = e.touches ? e.touches[0] : e;
      this.el.style.left = (ex + s.clientX - ox) + 'px';
      this.el.style.top  = (ey + s.clientY - oy) + 'px';
    };
    const onEnd = () => { dragging = false; };
    handle.addEventListener('touchstart', onStart, { passive: false });
    handle.addEventListener('mousedown',  onStart);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchend',  onEnd);
    document.addEventListener('mouseup',   onEnd);
    this._cleanups.push(() => {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchend',  onEnd);
      document.removeEventListener('mouseup',   onEnd);
    });
  }

  /* リサイズ */
  _bindResize(handle, corner = 'se') {
    let dragging = false, ox = 0, oy = 0, w0 = 0, h0 = 0, lx0 = 0, ty0 = 0, initSc = 1;
    const onStart = e => {
      dragging = true;
      const s = e.touches ? e.touches[0] : e;
      ox = s.clientX; oy = s.clientY;
      const r = this.el.getBoundingClientRect();
      w0 = r.width; h0 = r.height; lx0 = r.left; ty0 = r.top;
      initSc = this.innerScale;
      e.stopPropagation(); e.preventDefault();
    };
    const onMove = e => {
      if (!dragging) return;
      const s = e.touches ? e.touches[0] : e;
      const dx = s.clientX - ox, dy = s.clientY - oy;
      let nW = w0, nH = h0;
      if      (corner === 'se') { nW = Math.max(180, w0 + dx); nH = Math.max(160, h0 + dy); }
      else if (corner === 'sw') { nW = Math.max(180, w0 - dx); nH = Math.max(160, h0 + dy);
        this.el.style.left = (lx0 + w0 - nW) + 'px'; }
      else if (corner === 'nw') { nW = Math.max(180, w0 - dx); nH = Math.max(160, h0 - dy);
        this.el.style.left = (lx0 + w0 - nW) + 'px';
        this.el.style.top  = (ty0 + h0 - nH) + 'px'; }
      const k = Math.max(0.1, (nW - 4) / Math.max(1, w0 - 4));
      this.winW = nW; this.winH = nH;
      this.el.style.width  = nW + 'px';
      this.el.style.height = nH + 'px';
      this.innerScale = Math.max(0.2, Math.min(8, initSc * k));
      this._pdfCache = null;
      clearTimeout(this._resizeTimer);
      this._resizeTimer = setTimeout(() => this.render(), 60);
    };
    const onEnd = () => { dragging = false; };
    handle.addEventListener('touchstart', onStart, { passive: false });
    handle.addEventListener('mousedown',  onStart);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchend',  onEnd);
    document.addEventListener('mouseup',   onEnd);
    this._cleanups.push(() => {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchend',  onEnd);
      document.removeEventListener('mouseup',   onEnd);
    });
  }

  update(strokes, pageNum) {
    this.strokes = strokes; this._annDirty = true;
    if (pageNum !== undefined && pageNum !== this.pageNum) {
      this.pageNum = pageNum; this._pdfCache = null;
    }
    this.render();
  }

  close() {
    this._cleanups.forEach(fn => fn()); this._cleanups = [];
    document.body.removeChild(this.el);
    const i = subWindows.indexOf(this);
    if (i >= 0) subWindows.splice(i, 1);
    App.redrawSelOv?.();
  }
}

/* ============================================================
   別窓 (BetsuWin) — メインPDFとは独立した PDF ビューア
   ・独自 pdfDoc / ページ状態 / ズームを保持
   ・SubWin・メインApp の状態と完全独立
   ・ページキャッシュ 1枚
   ・BW_MAX_CANVAS : renderScale 論理上限 (cssEZ 発生を抑えるため 3200)
   ・BW_HI_CANVAS  : 実レンダリング上限 (Retina/高DPI 対応、メイン画面と統一)
   ============================================================ */
const BW_MAX_CANVAS = 3200; // 別窓 renderScale 上限 (旧: 2048 → 高解像度化)
const BW_HI_CANVAS  = 4096; // 別窓 実レンダリング上限 (Retina/高DPI用、メイン画面と統一)
const BW_MAX_WIN    = 3;    // 最大別窓数

class BetsuWin {
  constructor(x, y, w, h) {
    this.pdfDoc       = null;
    this.fileName     = '';
    this.curPage      = 1;
    this.totalPages   = 0;
    this.scale        = 1;
    this.renderScale  = 1;
    this.cssEZ        = 1;
    this.panX         = 8;
    this.panY         = 8;
    this.renderVer    = 0;
    this._pageObj     = null; // 1ページキャッシュ
    this._cachedPgNum = 0;

    this.winW   = w || 500;
    this.winH   = h || 380;
    this.sx     = x || 90;
    this.sy     = y || 90;
    this.pinch  = null;
    this.panSt  = null;
    this._cleanups = [];

    this._build();
  }

  /* ---- DOM構築 ---- */
  _build() {
    const el = document.createElement('div');
    el.className = 'bw';
    el.style.cssText =
      `left:${this.sx}px;top:${this.sy}px;width:${this.winW}px;height:${this.winH}px;z-index:${++bwZIndex}`;

    el.innerHTML = `
      <div class="bw-tb">
        <span class="bw-lbl">📄 別窓</span>
        <span class="bw-fn"></span>
        <button class="bw-navbtn bw-prev">◀</button>
        <span class="bw-pn">-/-</span>
        <button class="bw-navbtn bw-next">▶</button>
        <span class="bw-zl"></span>
        <div style="flex:1"></div>
        <button class="bw-openbtn">📂 開く</button>
        <button class="bw-close">✕</button>
      </div>
      <div class="bw-area">
        <div class="bw-cw"><canvas class="bw-cvs"></canvas></div>
        <div class="bw-dz">📄 別窓<br><small>「📂 開く」でPDFを読み込む</small></div>
      </div>
      <div class="bw-rz bw-rz-se"></div>
      <div class="bw-rz bw-rz-sw"></div>
      <div class="bw-rz bw-rz-nw"></div>`;

    this.el     = el;
    this.tb     = el.querySelector('.bw-tb');
    this.fnEl   = el.querySelector('.bw-fn');
    this.pnEl   = el.querySelector('.bw-pn');
    this.zlEl   = el.querySelector('.bw-zl');
    this.area   = el.querySelector('.bw-area');
    this.cw     = el.querySelector('.bw-cw');
    this.cvs    = el.querySelector('.bw-cvs');
    this.ctx    = this.cvs.getContext('2d');
    this.dz     = el.querySelector('.bw-dz');

    el.querySelector('.bw-close')  .addEventListener('pointerdown', e => { e.stopPropagation(); this.close(); });
    el.querySelector('.bw-openbtn').addEventListener('click', () => this._openFilePicker());
    el.querySelector('.bw-prev')   .addEventListener('click', () => this._gotoPage(-1));
    el.querySelector('.bw-next')   .addEventListener('click', () => this._gotoPage(+1));
    this.dz                        .addEventListener('click', () => this._openFilePicker());

    // 前面表示
    el.addEventListener('pointerdown', () => { el.style.zIndex = ++bwZIndex; }, { capture: true, passive: true });

    this._bindDrag(this.tb);
    this._bindResize(el.querySelector('.bw-rz-se'), 'se');
    this._bindResize(el.querySelector('.bw-rz-sw'), 'sw');
    this._bindResize(el.querySelector('.bw-rz-nw'), 'nw');
    this._bindAreaInput();

    document.body.appendChild(el);
  }

  /* ---- ファイル選択 ---- */
  _openFilePicker() {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/pdf';
    inp.onchange = async e => { const f = e.target.files[0]; if (f) await this.loadPDF(f); };
    inp.click();
  }

  /* ---- PDF 読み込み ---- */
  async loadPDF(file) {
    try {
      const buf = await file.arrayBuffer();
      // 既存 pdfDoc を破棄してメモリ解放
      if (this.pdfDoc) { try { this.pdfDoc.destroy(); } catch(_) {} }
      this.pdfDoc       = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
      this.fileName     = file.name;
      this.totalPages   = this.pdfDoc.numPages;
      this.curPage      = 1;
      this._pageObj     = null;
      this._cachedPgNum = 0;
      this.fnEl.textContent = file.name.length > 22 ? '…' + file.name.slice(-20) : file.name;
      this.dz.style.display = 'none';
      await this._fitPage();
      await this.renderPage(1);
    } catch(e) { console.error(e); showToast('別窓: 読み込み失敗'); }
  }

  /* ---- フィット ---- */
  async _fitPage() {
    const page = await this._getPage(this.curPage);
    const vp1  = page.getViewport({ scale: 1 });
    const aW   = this.area.clientWidth  - 16;
    const aH   = this.area.clientHeight - 16;
    this.scale = Math.max(0.1, Math.min(aW / vp1.width, aH / vp1.height));
    this.panX  = 8; this.panY = 8;
  }

  /* ---- ページオブジェクト取得 (1枚キャッシュ) ---- */
  async _getPage(num) {
    if (this._cachedPgNum === num && this._pageObj) return this._pageObj;
    this._pageObj     = await this.pdfDoc.getPage(num);
    this._cachedPgNum = num;
    return this._pageObj;
  }

  /* ---- ページ描画 ---- */
  async renderPage(num) {
    if (!this.pdfDoc) return;
    const ver  = ++this.renderVer;
    const page = await this._getPage(num);
    const vp1  = page.getViewport({ scale: 1 });
    const maxD = Math.max(vp1.width, vp1.height);

    // renderScale: BW_MAX_CANVAS を上限に cssEZ 発生を最小化
    this.renderScale = Math.min(this.scale, BW_MAX_CANVAS / maxD);
    this.cssEZ       = this.scale / this.renderScale;

    const vp    = page.getViewport({ scale: this.renderScale });
    const dpr   = Math.min(window.devicePixelRatio || 1, 2);
    // hiRS: BW_HI_CANVAS を上限に実レンダリング解像度を確保 (Retina対応)
    const hiRS  = Math.min(this.renderScale * dpr, (BW_HI_CANVAS - 4) / maxD);
    const hiVP  = page.getViewport({ scale: hiRS });

    // オフスクリーン描画
    const off    = document.createElement('canvas');
    off.width    = hiVP.width; off.height = hiVP.height;
    const offCtx = off.getContext('2d');
    offCtx.fillStyle = '#fff'; offCtx.fillRect(0, 0, off.width, off.height);
    await page.render({ canvasContext: offCtx, viewport: hiVP }).promise;

    if (ver !== this.renderVer) return; // キャンセル判定

    this.cvs.width  = hiVP.width;  this.cvs.height = hiVP.height;
    this.cvs.style.width  = vp.width  + 'px';
    this.cvs.style.height = vp.height + 'px';
    this.ctx.drawImage(off, 0, 0);

    this._clampPan();
    this._updateTransform();
    this._updateNav();
  }

  _updateTransform() {
    this.cw.style.transformOrigin = '0 0';
    this.cw.style.transform = Math.abs(this.cssEZ - 1) > 0.0005
      ? `translate(${this.panX}px,${this.panY}px) scale(${this.cssEZ})`
      : `translate(${this.panX}px,${this.panY}px)`;
  }

  _updateNav() {
    this.pnEl.textContent = this.totalPages ? `${this.curPage}/${this.totalPages}` : '-/-';
    this.zlEl.textContent = this.pdfDoc ? Math.round(this.scale * 100) + '%' : '';
  }

  _visualW() { return (parseFloat(this.cvs.style.width)  || this.cvs.width)  * this.cssEZ; }
  _visualH() { return (parseFloat(this.cvs.style.height) || this.cvs.height) * this.cssEZ; }

  _clampPan() {
    const mg = 40, aW = this.area.clientWidth || 1, aH = this.area.clientHeight || 1;
    this.panX = Math.max(-(this._visualW() - mg), Math.min(aW - mg, this.panX));
    this.panY = Math.max(-(this._visualH() - mg), Math.min(aH - mg, this.panY));
  }

  async _gotoPage(d) {
    if (!this.pdfDoc) return;
    const n = this.curPage + d;
    if (n < 1 || n > this.totalPages) return;
    this.curPage = n; await this.renderPage(n);
  }

  /* ---- タッチ / ホイール入力 ---- */
  _bindAreaInput() {
    const area = this.area;

    area.addEventListener('touchstart', e => {
      if (!this.pdfDoc) return; e.preventDefault();
      if (e.touches.length >= 2) { this.panSt = null; this._startPinch(e.touches); return; }
      this._startPan(e.touches[0]);
    }, { passive: false });

    area.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length >= 2 && this.pinch) { this._movePinch(e.touches); return; }
      if (this.panSt) this._movePan(e.touches[0]);
    }, { passive: false });

    area.addEventListener('touchend', e => {
      if (this.pinch && e.touches.length < 2) { this._endPinch(); return; }
      if (this.panSt) this.panSt = null;
    });

    area.addEventListener('wheel', e => {
      if (!this.pdfDoc) return; e.preventDefault();
      const r  = e.deltaY < 0 ? 1.15 : 0.87;
      const ar = this.area.getBoundingClientRect();
      const vx = e.clientX - ar.left, vy = e.clientY - ar.top;
      const pX = (vx - this.panX) / this.scale, pY = (vy - this.panY) / this.scale;
      this.scale = Math.max(0.1, Math.min(8, this.scale * r));
      this.panX  = vx - pX * this.scale; this.panY = vy - pY * this.scale;
      this._clampPan(); this.renderPage(this.curPage);
    }, { passive: false });
  }

  /* ---- ピンチ (軽量CSSプレビュー → endで再描画) ---- */
  _pd(t) { const dx=t[1].clientX-t[0].clientX,dy=t[1].clientY-t[0].clientY; return Math.sqrt(dx*dx+dy*dy); }
  _pm(t) { return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 }; }

  _startPinch(t) {
    const m = this._pm(t), ar = this.area.getBoundingClientRect();
    const bx = m.x - ar.left, by = m.y - ar.top;
    this.pinch = { d0: this._pd(t), s0: this.scale, target: this.scale,
                   pdfX: (bx - this.panX) / this.scale, pdfY: (by - this.panY) / this.scale };
  }
  _movePinch(t) {
    const p = this.pinch, r = this._pd(t) / p.d0;
    const m = this._pm(t), ar = this.area.getBoundingClientRect();
    const mx = m.x - ar.left, my = m.y - ar.top;
    p.target = Math.max(0.1, Math.min(8, p.s0 * r));
    p.lastMx = mx; p.lastMy = my;
    this.panX = mx - p.pdfX * p.target; this.panY = my - p.pdfY * p.target;
    // 軽量プレビュー (CSS scale のみ)
    const ez = p.target / this.renderScale;
    this.cw.style.transform = `translate(${this.panX}px,${this.panY}px) scale(${ez})`;
    this.zlEl.textContent = Math.round(p.target * 100) + '%';
  }
  _endPinch() {
    if (!this.pinch) return;
    this.scale = this.pinch.target; this.pinch = null;
    this.renderPage(this.curPage);
  }

  /* ---- パン ---- */
  _startPan(t) { this.panSt = { x0: t.clientX, y0: t.clientY, px0: this.panX, py0: this.panY }; }
  _movePan(t) {
    if (!this.panSt) return;
    this.panX = this.panSt.px0 + (t.clientX - this.panSt.x0);
    this.panY = this.panSt.py0 + (t.clientY - this.panSt.y0);
    this._clampPan(); this._updateTransform();
  }

  /* ---- ドラッグ移動 ---- */
  _bindDrag(handle) {
    let d = false, ox=0, oy=0, ex=0, ey=0;
    const onS = e => {
      if (e.target.closest('.bw-close,.bw-openbtn,.bw-prev,.bw-next')) return;
      d = true; const s = e.touches ? e.touches[0] : e;
      ox = s.clientX; oy = s.clientY;
      const r = this.el.getBoundingClientRect(); ex = r.left; ey = r.top; e.preventDefault();
    };
    const onM = e => {
      if (!d) return; const s = e.touches ? e.touches[0] : e;
      this.el.style.left = (ex + s.clientX - ox) + 'px';
      this.el.style.top  = (ey + s.clientY - oy) + 'px';
    };
    const onE = () => { d = false; };
    handle.addEventListener('touchstart', onS, { passive: false });
    handle.addEventListener('mousedown', onS);
    document.addEventListener('touchmove', onM, { passive: true });
    document.addEventListener('mousemove', onM);
    document.addEventListener('touchend', onE);
    document.addEventListener('mouseup', onE);
    this._cleanups.push(() => {
      document.removeEventListener('touchmove', onM);
      document.removeEventListener('mousemove', onM);
      document.removeEventListener('touchend', onE);
      document.removeEventListener('mouseup', onE);
    });
  }

  /* ---- リサイズ (右下 se / 左下 sw / 左上 nw) ---- */
  _bindResize(handle, corner) {
    let d=false, ox=0, oy=0, w0=0, h0=0, lx0=0, ly0=0;
    const onS = e => {
      d = true; const s = e.touches ? e.touches[0] : e;
      ox = s.clientX; oy = s.clientY;
      const r = this.el.getBoundingClientRect();
      w0=r.width; h0=r.height; lx0=r.left; ly0=r.top;
      e.stopPropagation(); e.preventDefault();
    };
    const onM = e => {
      if (!d) return; const s = e.touches ? e.touches[0] : e;
      const dx = s.clientX - ox, dy = s.clientY - oy;
      let nW=w0, nH=h0, nL=lx0, nT=ly0;
      if      (corner === 'se') { nW = Math.max(300, w0+dx); nH = Math.max(220, h0+dy); }
      else if (corner === 'sw') { nW = Math.max(300, w0-dx); nH = Math.max(220, h0+dy); nL = lx0+w0-nW; }
      else if (corner === 'nw') { nW = Math.max(300, w0-dx); nH = Math.max(220, h0-dy); nL = lx0+w0-nW; nT = ly0+h0-nH; }
      this.el.style.width  = nW + 'px'; this.el.style.height = nH + 'px';
      this.el.style.left   = nL + 'px'; this.el.style.top    = nT + 'px';
      this.winW = nW; this.winH = nH;
      clearTimeout(this._rzTimer);
      this._rzTimer = setTimeout(() => this.renderPage(this.curPage), 80);
    };
    const onE = () => { d = false; };
    handle.addEventListener('touchstart', onS, { passive: false });
    handle.addEventListener('mousedown', onS);
    document.addEventListener('touchmove', onM, { passive: true });
    document.addEventListener('mousemove', onM);
    document.addEventListener('touchend', onE);
    document.addEventListener('mouseup', onE);
    this._cleanups.push(() => {
      document.removeEventListener('touchmove', onM);
      document.removeEventListener('mousemove', onM);
      document.removeEventListener('touchend', onE);
      document.removeEventListener('mouseup', onE);
    });
  }

  /* ---- クローズ (メモリ解放) ---- */
  close() {
    this._cleanups.forEach(fn => fn()); this._cleanups = [];
    if (this.pdfDoc) { try { this.pdfDoc.destroy(); } catch(_) {} this.pdfDoc = null; }
    document.body.removeChild(this.el);
    const i = betsuWindows.indexOf(this); if (i >= 0) betsuWindows.splice(i, 1);
  }
}

/** 別窓を開く (最大 BW_MAX_WIN 個まで) */
function openBetsuWin() {
  if (betsuWindows.length >= BW_MAX_WIN) {
    showToast(`別窓は最大${BW_MAX_WIN}つです`); return;
  }
  const offset = betsuWindows.length * 28;
  const bw = new BetsuWin(80 + offset, 80 + offset, 520, 400);
  betsuWindows.push(bw);
}

/* ============================================================
   メインアプリ
   ============================================================ */
const App = (() => {
  /* DOM */
  const caEl    = document.getElementById('ca');
  const cwEl    = document.getElementById('cw');
  const pdfCvs  = document.getElementById('pdfCvs');
  const annCvs  = document.getElementById('annCvs');
  const ovlCvs  = document.getElementById('ovlCvs');
  const pdfCtx  = pdfCvs.getContext('2d');
  const annCtx  = annCvs.getContext('2d');
  const ovlCtx  = ovlCvs.getContext('2d');

  /* 状態 */
  let pdfDoc     = null, origBuf = null, fileName = '';
  let curPage    = 1, totalPages = 0, scale = 1;
  let strokes    = {};
  let renderScale = 1, cssExtraZoom = 1;
  let curStroke  = null, isDrawing = false, lastX = 0, lastY = 0;
  let _wheelTimer = null;  // wheel連打 debounce 用
  let _offscr     = null;  // offscreen canvas 再利用キャッシュ
  let pinch      = null, panSt    = null;
  let selectedIdx = [], selPath = [];
  let subRect    = null;
  let renderVer  = 0;
  let panX = 16, panY = 16;
  let velHist = [], rafId = null;

  const pageCache = new Map();

  /* ---- トランスフォーム ---- */
  function updateTransform() {
    cwEl.style.transformOrigin = '0 0';
    cwEl.style.transform = Math.abs(cssExtraZoom - 1) > 0.0005
      ? `translate(${panX}px,${panY}px) scale(${cssExtraZoom})`
      : `translate(${panX}px,${panY}px)`;
  }
  function visualW() { return (parseFloat(pdfCvs.style.width)  || pdfCvs.width)  * cssExtraZoom; }
  function visualH() { return (parseFloat(pdfCvs.style.height) || pdfCvs.height) * cssExtraZoom; }
  function clampPan() {
    const margin = 60;
    const aW = caEl.clientWidth || 1, aH = caEl.clientHeight || 1;
    panX = Math.max(-(visualW() - margin), Math.min(aW - margin, panX));
    panY = Math.max(-(visualH() - margin), Math.min(aH - margin, panY));
  }
  function centerCanvas() {
    const aW = caEl.clientWidth || 1, aH = caEl.clientHeight || 1;
    panX = Math.max(16, (aW - visualW()) / 2);
    panY = Math.max(16, (aH - visualH()) / 2);
    updateTransform();
  }
  function cancelInertia() { cancelAnimationFrame(rafId); rafId = null; }

  /* ---- 座標変換 ---- */
  function getDocPos(src) {
    const r = caEl.getBoundingClientRect();
    return { x: (src.clientX - r.left - panX) / scale,
             y: (src.clientY - r.top  - panY) / scale };
  }
  function isOnCanvas(src) {
    const r = caEl.getBoundingClientRect();
    const rx = src.clientX - r.left - panX;
    const ry = src.clientY - r.top  - panY;
    return rx >= -20 && rx <= visualW() + 20 && ry >= -20 && ry <= visualH() + 20;
  }

  /* ---- タッチハンドラ ---- */
  caEl.addEventListener('touchstart', onTouchStart, { passive: false });
  caEl.addEventListener('touchmove',  onTouchMove,  { passive: false });
  caEl.addEventListener('touchend',   onTouchEnd,   { passive: true  });
  caEl.addEventListener('mousedown',  e => { if (pdfDoc) { cancelInertia(); startDraw(e); } });
  caEl.addEventListener('mousemove',  e => { if (isDrawing) moveDraw(e); else if (panSt) movePan(e); });
  caEl.addEventListener('mouseup',    e => { if (isDrawing) endDraw(e); else if (panSt) endPan(e); });
  caEl.addEventListener('wheel', e => {
    if (!pdfDoc) return; e.preventDefault();
    const r    = e.deltaY < 0 ? 1.15 : 0.87;
    const cr   = caEl.getBoundingClientRect();
    const vx   = e.clientX - cr.left, vy = e.clientY - cr.top;
    const pdfX = (vx - panX) / scale, pdfY = (vy - panY) / scale;
    scale = Math.max(0.2, Math.min(MAX_SCALE, scale * r));
    panX  = vx - pdfX * scale; panY = vy - pdfY * scale;
    clampPan();
    // CSS プレビューで即時反映（renderPage は debounce して連打を防止）
    const previewEZ = scale / renderScale;
    cwEl.style.transformOrigin = '0 0';
    cwEl.style.transform = `translate(${panX}px,${panY}px) scale(${previewEZ})`;
    document.getElementById('zlbl').textContent = Math.round(scale * 100) + '%';
    clearTimeout(_wheelTimer);
    _wheelTimer = setTimeout(() => renderPage(curPage), 150);
  }, { passive: false });

  function onTouchStart(e) {
    if (!pdfDoc) return; e.preventDefault(); cancelInertia();
    if (e.touches.length >= 2) {
      isDrawing = false; curStroke = null; panSt = null;
      startPinch(e.touches); return;
    }
    const t = e.touches[0];
    if (!isOnCanvas(t)) { startPan(t); return; }
    const needPen = ['pen','hl'].includes(currentTool);
    if (needPen && t.touchType !== 'stylus') { startPan(t); return; }
    startDraw(e);
  }
  function onTouchMove(e) {
    e.preventDefault();
    if (e.touches.length >= 2 && pinch) { movePinch(e.touches); return; }
    const t = e.touches[0];
    if (panSt)     { movePan(t);   return; }
    if (isDrawing)   moveDraw(e);
  }
  function onTouchEnd(e) {
    if (pinch && e.touches.length < 2) { endPinch(); return; }
    if (panSt)     { endPan(e.changedTouches[0]); return; }
    if (isDrawing)   endDraw(e);
  }

  /* ---- ピンチ ---- */
  function pinchDist(t) { const dx=t[1].clientX-t[0].clientX,dy=t[1].clientY-t[0].clientY; return Math.sqrt(dx*dx+dy*dy); }
  function pinchMid(t)  { return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 }; }

  function startPinch(t) {
    const m = pinchMid(t), cr = caEl.getBoundingClientRect();
    const bx = m.x - cr.left, by = m.y - cr.top;
    pinch = { d0: pinchDist(t), s0: scale, target: scale,
              pdfX: (bx-panX)/scale, pdfY: (by-panY)/scale };
  }
  function movePinch(t) {
    const p = pinch, r = pinchDist(t) / p.d0;
    const m = pinchMid(t), cr = caEl.getBoundingClientRect();
    const M1x = m.x - cr.left, M1y = m.y - cr.top;
    p.target = Math.max(0.2, Math.min(MAX_SCALE, p.s0 * r));
    panX = M1x - p.pdfX * p.target; panY = M1y - p.pdfY * p.target;
    const previewEZ = p.target / renderScale;
    cwEl.style.transformOrigin = '0 0';
    cwEl.style.transform = `translate(${panX}px,${panY}px) scale(${previewEZ})`;
    document.getElementById('zlbl').textContent = Math.round(p.target * 100) + '%';
  }
  function endPinch() {
    if (!pinch) return;
    scale = pinch.target; pinch = null;
    renderPage(curPage);
  }

  /* ---- パン + 慣性 ---- */
  function startPan(t) { panSt = { x0: t.clientX, y0: t.clientY, px0: panX, py0: panY }; velHist = []; }
  function movePan(t) {
    if (!panSt) return;
    velHist.push({ x: t.clientX, y: t.clientY, tm: Date.now() });
    if (velHist.length > 6) velHist.shift();
    panX = panSt.px0 + (t.clientX - panSt.x0);
    panY = panSt.py0 + (t.clientY - panSt.y0);
    clampPan(); updateTransform();
  }
  function endPan(t) {
    if (!panSt) return; panSt = null;
    if (velHist.length >= 2) {
      const n = velHist[velHist.length-1], f = velHist[0];
      const dt = Math.max(1, n.tm - f.tm);
      let vx = (n.x - f.x) / dt * 14, vy = (n.y - f.y) / dt * 14;
      const step = () => {
        if (Math.abs(vx) < 0.4 && Math.abs(vy) < 0.4) return;
        panX += vx; panY += vy; clampPan(); updateTransform();
        vx *= 0.9; vy *= 0.9; rafId = requestAnimationFrame(step);
      };
      rafId = requestAnimationFrame(step);
    }
  }

  /* ---- 描画 ---- */
  function startDraw(e) {
    const t = e.touches ? e.touches[0] : e;
    const p = getDocPos(t);

    if (currentTool === 'text') {
      txX = p.x; txY = p.y;
      document.getElementById('txfld').value = '';
      document.getElementById('txov').classList.add('on');
      return;
    }
    if (currentTool === 'select') {
      if (selectedIdx.length > 0) {
        const bb = selBBox();
        if (bb && p.x >= bb.x1-10/scale && p.x <= bb.x2+10/scale
               && p.y >= bb.y1-10/scale && p.y <= bb.y2+10/scale) {
          isDrawing = true; lastX = p.x; lastY = p.y; return;
        } else clearSel();
      }
      selPath = [{ x: p.x, y: p.y }]; isDrawing = true; return;
    }
    if (currentTool === 'sub') {
      subRect = { x1: p.x, y1: p.y, x2: p.x, y2: p.y }; isDrawing = true; return;
    }
    isDrawing = true; lastX = p.x; lastY = p.y;
    const tool = currentTool === 'shape' ? currentShape : currentTool;
    curStroke = ['pen','hl','eraser'].includes(tool)
      ? { type: tool, points: [[p.x, p.y]], color: strokeColor, size: strokeSize }
      : { type: tool, x1: p.x, y1: p.y, x2: p.x, y2: p.y, color: strokeColor, size: strokeSize };
  }

  function moveDraw(e) {
    const t   = e.touches ? e.touches[0] : e;
    const p   = getDocPos(t);
    const sc  = renderScale;
    const invEZ = 1 / cssExtraZoom;

    if (currentTool === 'select') {
      if (selectedIdx.length > 0 && !selPath.length) {
        moveSel(p.x - lastX, p.y - lastY); lastX = p.x; lastY = p.y;
        redraw(); drawSelOv(); return;
      }
      selPath.push({ x: p.x, y: p.y }); drawSelPreview(); return;
    }

    if (currentTool === 'sub' && subRect) {
      subRect.x2 = p.x; subRect.y2 = p.y;
      ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
      ovlCtx.save();
      ovlCtx.strokeStyle = '#f07800'; ovlCtx.lineWidth = 2 * invEZ;
      ovlCtx.setLineDash([8*invEZ, 4*invEZ]);
      ovlCtx.strokeRect(subRect.x1*sc, subRect.y1*sc, (subRect.x2-subRect.x1)*sc, (subRect.y2-subRect.y1)*sc);
      ovlCtx.fillStyle = 'rgba(240,120,0,.08)';
      ovlCtx.fillRect(subRect.x1*sc, subRect.y1*sc, (subRect.x2-subRect.x1)*sc, (subRect.y2-subRect.y1)*sc);
      ovlCtx.restore(); return;
    }

    if (!curStroke) return;
    const s = curStroke;

    if (['pen','hl'].includes(s.type)) {
      s.points.push([p.x, p.y]);
      annCtx.save();
      annCtx.globalCompositeOperation = 'source-over';
      annCtx.globalAlpha = s.type === 'hl' ? 0.38 : 1;
      annCtx.strokeStyle = s.color;
      annCtx.lineWidth   = s.type === 'hl' ? Math.max(s.size*4, 5) * sc / 3 : s.size * sc / 3; // [THIN2]
      annCtx.lineCap = 'round'; annCtx.lineJoin = 'round';
      annCtx.beginPath();
      drawLiveBezierSegment(annCtx, s.points, [p.x, p.y], sc);
      annCtx.stroke(); annCtx.restore();
      lastX = p.x; lastY = p.y;

    } else if (s.type === 'eraser') {
      s.points.push([p.x, p.y]); lastX = p.x; lastY = p.y;
      ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
      drawSubOverlays();
      ovlCtx.save();
      ovlCtx.strokeStyle = '#888'; ovlCtx.lineWidth = Math.max(1, 1.5*invEZ);
      ovlCtx.setLineDash([4*invEZ, 2*invEZ]);
      ovlCtx.beginPath();
      ovlCtx.arc(p.x*sc, p.y*sc, s.size*2*sc/3, 0, Math.PI*2); // [THIN2] カーソルも/3
      ovlCtx.stroke(); ovlCtx.restore();

    } else {
      // 図形プレビューを ovlCvs へ描画（全注釈 redraw を回避 → touchmove 軽量化）
      s.x2 = p.x; s.y2 = p.y;
      ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
      drawSubOverlays();
      drawStroke(s, ovlCtx, sc);
    }
  }

  function endDraw(e) {
    isDrawing = false;

    if (currentTool === 'select') {
      if (selectedIdx.length > 0 && !selPath.length) { drawSelOv(); schedSave(); return; }
      finishSel(); return;
    }
    if (currentTool === 'sub' && subRect) {
      const r = {
        x1: Math.min(subRect.x1, subRect.x2), y1: Math.min(subRect.y1, subRect.y2),
        x2: Math.max(subRect.x1, subRect.x2), y2: Math.max(subRect.y1, subRect.y2)
      };
      if ((r.x2-r.x1) > 10/scale && (r.y2-r.y1) > 10/scale) {
        if (subWindows.length >= MAX_SUBWIN) {
          showToast(`サブ窓は最大${MAX_SUBWIN}つです`);
        } else {
          const cr = caEl.getBoundingClientRect();
          const sx = cr.left + panX + r.x1 * scale;
          const sy = cr.top  + panY + r.y1 * scale;
          subWindows.push(new SubWin(pdfDoc, strokes, curPage, r, sx, sy, scale));
        }
      }
      subRect = null;
      ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
      setTool('pen'); return; // サブ窓作成後は常にペンモードへ復帰
    }
    // ② 消しゴム: 全タイプを即時削除（eraser を配列に保存しない）
    //    → _drawAnnotations が常に単純パス → temp canvas 生成ゼロ → freeze しない
    //    pen/hl → _applyEraser で部分削除
    //    shapes → _applyEraserAll で全体削除
    //    text   → 保護
    if (curStroke?.type === 'eraser') {
      const er = curStroke;
      const r  = (er.size || 20) * 2 / 3;
      const erPts = er.points || [];
      strokes[curPage] = (strokes[curPage] || []).flatMap(s => _applyEraserAll(s, erPts, r));
      curStroke = null;
      ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
      redraw(); drawSelOv();
      subWindows.forEach(sw => sw.update(strokes, curPage));
      schedSave(); return;
    }
    if (currentTool === 'eraser') drawSelOv();
    if (!curStroke) return;
    if (!strokes[curPage]) strokes[curPage] = [];
    const s = curStroke;
    strokes[curPage].push({ ...s, points: s.points ? [...s.points] : undefined });
    curStroke = null; redraw();
    subWindows.forEach(sw => sw.update(strokes, curPage));
    schedSave();
  }

  /* ---- 選択 ---- */
  function finishSel() {
    const arr = strokes[curPage] || [];
    if (selMode === 'rect' && selPath.length >= 2) {
      const xs  = selPath.map(p => p.x), ys = selPath.map(p => p.y);
      const rx1 = Math.min(...xs), ry1 = Math.min(...ys);
      const rx2 = Math.max(...xs), ry2 = Math.max(...ys);
      selectedIdx = arr.reduce((a, s, i) => {
        const bb = strokeBBox(s); if (!bb) return a;
        if (!(bb.x2 < rx1 || bb.x1 > rx2 || bb.y2 < ry1 || bb.y1 > ry2)) a.push(i);
        return a;
      }, []);
    } else if (selMode === 'lasso' && selPath.length >= 3) {
      const poly = selPath.map(p => [p.x, p.y]);
      selectedIdx = arr.reduce((a, s, i) => {
        const bb = strokeBBox(s); if (!bb) return a;
        if (ptInPoly((bb.x1+bb.x2)/2, (bb.y1+bb.y2)/2, poly)) a.push(i);
        return a;
      }, []);
    }
    selPath = []; ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
    drawSelOv();
    document.getElementById('selbtn').style.display = selectedIdx.length ? 'block' : 'none';
  }

  function drawSelPreview() {
    ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
    drawSubOverlays(); if (!selPath.length) return;
    const sc = renderScale, invEZ = 1 / cssExtraZoom;
    ovlCtx.save();
    ovlCtx.strokeStyle = '#4488ff'; ovlCtx.lineWidth = 2 * invEZ;
    ovlCtx.setLineDash(selMode === 'rect' ? [6*invEZ, 4*invEZ] : []);
    if (selMode === 'rect') {
      const p0 = selPath[0], p1 = selPath[selPath.length-1];
      ovlCtx.strokeRect(Math.min(p0.x,p1.x)*sc, Math.min(p0.y,p1.y)*sc,
                        Math.abs(p1.x-p0.x)*sc, Math.abs(p1.y-p0.y)*sc);
    } else {
      ovlCtx.beginPath();
      selPath.forEach((p, i) => i ? ovlCtx.lineTo(p.x*sc, p.y*sc) : ovlCtx.moveTo(p.x*sc, p.y*sc));
      ovlCtx.stroke();
    }
    ovlCtx.restore();
  }

  function selBBox() {
    const arr = strokes[curPage] || [];
    const bbs = selectedIdx.map(i => strokeBBox(arr[i])).filter(Boolean);
    if (!bbs.length) return null;
    return {
      x1: Math.min(...bbs.map(b => b.x1)), y1: Math.min(...bbs.map(b => b.y1)),
      x2: Math.max(...bbs.map(b => b.x2)), y2: Math.max(...bbs.map(b => b.y2))
    };
  }

  function moveSel(dx, dy) {
    const arr = strokes[curPage] || [];
    selectedIdx.forEach(i => {
      const s = arr[i]; if (!s) return;
      if (s.points) s.points = s.points.map(p => [p[0]+dx, p[1]+dy]);
      if (s.x1 !== undefined) { s.x1 += dx; s.y1 += dy; s.x2 += dx; s.y2 += dy; }
      if (s.type === 'text')  { s.x  += dx; s.y  += dy; }
    });
  }

  function clearSel() {
    selectedIdx = []; selPath = [];
    ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
    drawSubOverlays();
    document.getElementById('selbtn').style.display = 'none';
  }

  function drawSelOv() {
    ovlCtx.clearRect(0, 0, ovlCvs.width, ovlCvs.height);
    drawSubOverlays();
    if (!selectedIdx.length) return;
    const arr = strokes[curPage] || [];
    const sc  = renderScale, invEZ = 1 / cssExtraZoom;
    ovlCtx.save();
    ovlCtx.strokeStyle = '#4488ff'; ovlCtx.lineWidth = 2 * invEZ;
    ovlCtx.setLineDash([6*invEZ, 3*invEZ]);
    selectedIdx.forEach(i => {
      const bb = strokeBBox(arr[i]); if (!bb) return;
      ovlCtx.strokeRect(bb.x1*sc-4*invEZ, bb.y1*sc-4*invEZ,
                        (bb.x2-bb.x1)*sc+8*invEZ, (bb.y2-bb.y1)*sc+8*invEZ);
    });
    ovlCtx.restore();
    const bb = selBBox();
    if (bb) {
      const wr  = cwEl.getBoundingClientRect();
      const btn = document.getElementById('selbtn');
      btn.style.left = Math.max(0, wr.left + bb.x1*scale - 4) + 'px';
      btn.style.top  = Math.max(0, wr.top  + bb.y2*scale + 6) + 'px';
    }
  }

  /* ---- サブ窓オーバーレイ ---- */
  function drawSubOverlays() {
    if (!pdfDoc || !subWindows.length) return;
    const sc = renderScale, invEZ = 1 / cssExtraZoom;
    subWindows.forEach(sw => {
      const br = sw.body.getBoundingClientRect();
      if (!br.width || !br.height) return;
      const rX1 = sw.offX * sc, rY1 = sw.offY * sc;
      const rW  = (br.width  / sw.innerScale) * sc;
      const rH  = (br.height / sw.innerScale) * sc;
      ovlCtx.save();
      ovlCtx.fillStyle   = sw.swFill  || 'rgba(240,120,0,0.12)'; ovlCtx.fillRect(rX1, rY1, rW, rH);
      ovlCtx.strokeStyle = sw.swColor || '#f07800';
      ovlCtx.lineWidth   = 2 * invEZ; ovlCtx.setLineDash([8*invEZ, 4*invEZ]);
      ovlCtx.strokeRect(rX1, rY1, rW, rH);
      ovlCtx.restore();
    });
  }

  function redraw() {
    annCtx.clearRect(0, 0, annCvs.width, annCvs.height);
    _drawAnnotations(annCtx, strokes[curPage] || [], renderScale); // ② 消しゴムは text 以外すべて対象
    drawSelOv();
  }

  /* ---- レンダリング ---- */
  async function renderPage(num) {
    if (!pdfDoc) return;
    const ver = ++renderVer;

    let page = pageCache.get(num);
    if (!page) { page = await pdfDoc.getPage(num); pageCache.set(num, page); }

    const vp1    = page.getViewport({ scale: 1 });
    const maxDim = Math.max(vp1.width, vp1.height);

    renderScale  = Math.min(scale, MAX_CANVAS / maxDim);
    cssExtraZoom = scale / renderScale;

    const vp     = page.getViewport({ scale: renderScale });
    const dpr    = Math.min(window.devicePixelRatio || 1, PDF_MAX_DPR);
    const hiRS   = Math.min(renderScale * dpr, (4096 - 4) / maxDim);
    const hiVP   = page.getViewport({ scale: hiRS });

    // offscreen canvas を再利用（サイズ変更時のみ再生成して毎回の大型確保を回避）
    if (!_offscr || _offscr.width !== hiVP.width || _offscr.height !== hiVP.height) {
      _offscr = document.createElement('canvas');
      _offscr.width = hiVP.width; _offscr.height = hiVP.height;
    }
    const offCtx = _offscr.getContext('2d');
    offCtx.fillStyle = '#ffffff'; offCtx.fillRect(0, 0, hiVP.width, hiVP.height);
    await page.render({ canvasContext: offCtx, viewport: hiVP }).promise;

    if (ver !== renderVer) return;

    pdfCvs.width  = hiVP.width; pdfCvs.height = hiVP.height;
    pdfCvs.style.width  = vp.width  + 'px';
    pdfCvs.style.height = vp.height + 'px';
    [annCvs, ovlCvs].forEach(c => { c.width = vp.width; c.height = vp.height; });
    pdfCtx.drawImage(_offscr, 0, 0);
    redraw(); clearSel(); clampPan();
    requestAnimationFrame(() => { clampPan(); updateTransform(); });

    document.getElementById('pgn').value    = num;
    document.getElementById('zlbl').textContent = Math.round(scale * 100) + '%';
  }

  /* ---- PDF読み込み ---- */
  async function loadPDF(file, buf) {
    showLoading(true);
    try {
      origBuf    = buf || await file.arrayBuffer();
      fileName   = file.name;
      document.getElementById('fnlbl').textContent = fileName;
      pdfDoc     = await pdfjsLib.getDocument({ data: origBuf.slice(0) }).promise;
      totalPages = pdfDoc.numPages;
      document.getElementById('tpn').textContent = totalPages;
      curPage = 1; panX = 16; panY = 16; scale = 1;
      renderScale = 1; cssExtraZoom = 1; pageCache.clear();
      subWindows.slice().forEach(sw => sw.close());
      document.getElementById('dz').style.display = 'none';
      cwEl.style.display = 'block';

      const saved = await IDB.get('f:' + safeKey(file.name));
      strokes = _pruneEraserStrokes(saved?.strokes || {});
      await renderPage(1); await fit();
      if (saved?.strokes && Object.keys(saved.strokes).length > 0)
        showToast('📝 書き込みデータを復元しました');
      _postLoadFn?.(); // シートタブへ同期 (シートマネージャーが登録)
    } catch(e) { showToast('読み込みに失敗しました'); console.error(e); }
    showLoading(false);
  }

  /* ---- ページ操作 ---- */
  async function gotoPage(d, abs = false) {
    if (!pdfDoc) return;
    const n = abs ? Math.max(1, Math.min(totalPages, d)) : curPage + d;
    if (n < 1 || n > totalPages) return;
    curPage = n; await renderPage(n);
    subWindows.forEach(sw => sw.update(strokes, n));
    schedSave();
  }
  async function fit() {
    if (!pdfDoc) return;
    const page = await pdfDoc.getPage(curPage);
    const vp   = page.getViewport({ scale: 1 });
    const aW   = caEl.clientWidth || 1, aH = caEl.clientHeight || 1;
    scale = Math.max(0.2, Math.min((aW-32) / vp.width, (aH-32) / vp.height));
    await renderPage(curPage); centerCanvas();
  }
  function undo() {
    const a = strokes[curPage];
    if (!a || !a.length) { showToast('操作がありません'); return; }
    a.pop(); redraw(); subWindows.forEach(sw => sw.update(strokes, curPage)); schedSave();
  }
  function clear() {
    if (!confirm('消去しますか？')) return;
    strokes[curPage] = []; redraw();
    subWindows.forEach(sw => sw.update(strokes, curPage)); schedSave();
  }
  function deleteSelected() {
    if (!selectedIdx.length) return;
    strokes[curPage] = (strokes[curPage] || []).filter((_, i) => !selectedIdx.includes(i));
    clearSel(); redraw(); subWindows.forEach(sw => sw.update(strokes, curPage)); schedSave();
  }
  function closeFile() {
    if (pdfDoc && !confirm('閉じますか？（保存済みデータは残ります）')) return;
    pdfDoc = null; origBuf = null; fileName = ''; curPage = 1; totalPages = 0; strokes = {};
    [pdfCvs, annCvs, ovlCvs].forEach(c => { c.width = 1; c.height = 1; });
    cwEl.style.display = 'none';
    document.getElementById('dz').style.display = '';
    document.getElementById('fnlbl').textContent = 'ファイル未選択';
    document.getElementById('tpn').textContent   = '0';
    document.getElementById('zlbl').textContent  = '--';
    subWindows.slice().forEach(sw => sw.close());
    _fileHandle = null; renderScale = 1; cssExtraZoom = 1;
  }

  /* ---- ファイル入力 ---- */
  document.getElementById('fileInput').addEventListener('change', async e => {
    const f = e.target.files[0]; if (f) await loadPDF(f); e.target.value = '';
  });
  caEl.addEventListener('dragover', e => e.preventDefault());
  caEl.addEventListener('drop',     e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) loadPDF(f); });

  /* ---- 起動時復元 ---- */
  async function restore(saved) {
    origBuf    = saved.buf; fileName = saved.file;
    document.getElementById('fnlbl').textContent = fileName;
    pdfDoc     = await pdfjsLib.getDocument({ data: saved.buf.slice(0) }).promise;
    totalPages = pdfDoc.numPages;
    document.getElementById('tpn').textContent = totalPages;
    strokes    = _pruneEraserStrokes(saved.strokes || {});
    curPage    = saved.page || 1; scale = saved.scale || 1;
    panX = 16; panY = 16; renderScale = 1; cssExtraZoom = 1;
    document.getElementById('dz').style.display = 'none';
    cwEl.style.display = 'block';
    await renderPage(curPage); centerCanvas();
  }

  /* ---- タブ連携: 状態保存・復元 ---- */
  let _postLoadFn = null; // ファイル読み込み後フック (シートマネージャーが設定)

  /** 現在のApp状態スナップショットを返す (参照渡し・コピーなし) */
  function saveState() {
    return { pdfDoc, origBuf, fileName, curPage, totalPages,
             scale, renderScale, cssExtraZoom, panX, panY, strokes };
  }

  /** シート切替時にApp状態を一括復元してページ再描画 */
  async function loadState(sh) {
    pdfDoc       = sh.pdfDoc;       origBuf    = sh.origBuf;
    fileName     = sh.fileName || ''; curPage  = sh.curPage || 1;
    totalPages   = sh.totalPages || 0; scale   = sh.scale  || 1;
    renderScale  = sh.renderScale  || 1; cssExtraZoom = sh.cssExtraZoom || 1;
    panX         = sh.panX ?? 16;   panY       = sh.panY ?? 16;
    strokes      = sh.strokes || {}; pageCache.clear();
    selectedIdx  = []; selPath = [];

    document.getElementById('fnlbl').textContent = fileName || 'ファイル未選択';
    document.getElementById('tpn').textContent   = totalPages || '0';
    document.getElementById('pgn').value         = curPage;

    if (pdfDoc) {
      document.getElementById('dz').style.display = 'none';
      cwEl.style.display = 'block';
      await renderPage(curPage);
    } else {
      document.getElementById('dz').style.display = '';
      cwEl.style.display = 'none';
      document.getElementById('zlbl').textContent = '--';
      [pdfCvs, annCvs, ovlCvs].forEach(c => { c.width = 1; c.height = 1; });
    }
  }

  return {
    gotoPage, fit, undo, clear, deleteSelected, closeFile, redraw, loadPDF,
    drawSubOverlays, redrawSelOv: drawSelOv,
    saveState, loadState,
    setPostLoad(fn) { _postLoadFn = fn; }, // シートマネージャーから呼ぶ
    get pdfDoc()      { return pdfDoc;      },
    get origBuf()     { return origBuf;     },
    get fileName()    { return fileName;    },
    get strokes()     { return strokes;     },
    get currentPage() { return curPage;     },
    get totalPages()  { return totalPages;  },
    get scale()       { return scale;       },
    restore
  };
})();

/* 起動時復元 */
(async () => {
  const saved = await IDB.get('last'); if (!saved?.buf) return;
  showLoading(true);
  try {
    await App.restore(saved);
    if (typeof _sheetSync === 'function') _sheetSync(); // タブへ反映
    showToast('前回の状態を復元しました');
  }
  catch(e) { console.error('Restore:', e); }
  showLoading(false);
})();

/* ============================================================
   シートマネージャー (タブ管理)
   各シートは pdfDoc・strokes・ズーム・ページ・サブ窓状態を独立保持。
   タブ切替時のみ App 状態を保存/復元することで最小限の変更に抑える。
   メモリ: 非アクティブ pdfDoc は参照保持のみ (pageCache は切替時クリア)
   ============================================================ */
const MAX_SHEETS = 8;   // タブ最大数
let _sheets   = [];     // シート状態配列
let _sheetIdx = 0;      // アクティブインデックス
let _sheetSeq = 0;      // ID カウンタ

/** 空シートオブジェクトを生成 */
function _emptySheet() {
  return { id: ++_sheetSeq, pdfDoc: null, origBuf: null, fileName: '(新規)',
           curPage: 1, totalPages: 0, scale: 1, renderScale: 1, cssExtraZoom: 1,
           panX: 16, panY: 16, strokes: {}, subWinStates: [], fh: null };
}
_sheets.push(_emptySheet()); // 初期シート

/** サブ窓状態を保存して DOM を閉じる */
function _freezeSubWins() {
  const st = subWindows.map(sw => ({
    pageNum: sw.pageNum, offX: sw.offX, offY: sw.offY,
    innerScale: sw.innerScale,
    winW: sw.el.clientWidth  || sw.winW,
    winH: sw.el.clientHeight || sw.winH,
    left: sw.el.style.left, top: sw.el.style.top,
    rW: (sw.cvs.width  || 400) / sw.innerScale,
    rH: (sw.cvs.height || 300) / sw.innerScale
  }));
  subWindows.slice().forEach(sw => sw.close());
  return st;
}

/** 保存済みサブ窓状態から DOM を再構築 */
function _thawSubWins(states, doc, strks) {
  if (!states || !doc) return;
  states.forEach(s => {
    if (subWindows.length >= MAX_SUBWIN) return;
    const region = { x1: s.offX, y1: s.offY,
                     x2: s.offX + (s.rW || 200), y2: s.offY + (s.rH || 200) };
    const sx = parseFloat(s.left) || 80, sy = parseFloat(s.top) || 80;
    const sw = new SubWin(doc, strks, s.pageNum, region, sx, sy, s.innerScale);
    if (s.winW && s.winH) {
      sw.winW = s.winW; sw.winH = s.winH;
      sw.el.style.width = s.winW + 'px'; sw.el.style.height = s.winH + 'px';
    }
    subWindows.push(sw);
  });
}

/** 現在の App 状態を現在シートへ同期 (_postLoadFn 経由でも呼ばれる) */
function _sheetSync() {
  if (!_sheets[_sheetIdx]) return;
  Object.assign(_sheets[_sheetIdx], App.saveState(), { fh: _fileHandle });
  _renderTabBar();
}

/** タブバー DOM を再描画 */
function _renderTabBar() {
  const bar = document.getElementById('tabbar');
  if (!bar) return;
  bar.innerHTML = '';
  _sheets.forEach((sh, i) => {
    const div = document.createElement('div');
    div.className = 'shtab' + (i === _sheetIdx ? ' active' : '');
    const raw = sh.fileName === '(新規)' ? '(新規)' : sh.fileName.replace(/\.pdf$/i, '');
    const label = raw.length > 16 ? raw.slice(0, 15) + '…' : raw;
    div.innerHTML = `<span class="shtab-nm" title="${sh.fileName}">📄 ${label}</span>`
                  + `<button class="shtab-x" title="閉じる">✕</button>`;
    div.addEventListener('click', e => {
      if (!e.target.classList.contains('shtab-x')) switchToSheet(i);
    });
    div.querySelector('.shtab-x').addEventListener('click', e => {
      e.stopPropagation(); closeSheetAt(i);
    });
    bar.appendChild(div);
  });
  const add = document.createElement('button');
  add.className = 'shtab-add'; add.title = 'PDFを追加 (新タブ)'; add.textContent = '＋';
  add.addEventListener('click', () => addSheet());
  bar.appendChild(add);
}

/** タブ切替 */
async function switchToSheet(idx) {
  if (idx === _sheetIdx || idx < 0 || idx >= _sheets.length) { _renderTabBar(); return; }
  showLoading(true);
  // 現在シートを保存
  _sheets[_sheetIdx].subWinStates = _freezeSubWins();
  Object.assign(_sheets[_sheetIdx], App.saveState(), { fh: _fileHandle });
  // 新シートへ切替
  _sheetIdx = idx;
  const sh = _sheets[_sheetIdx];
  _fileHandle = sh.fh || null;
  await App.loadState(sh);
  _thawSubWins(sh.subWinStates, sh.pdfDoc, App.strokes);
  _renderTabBar();
  showLoading(false);
}

/** 新タブを追加してファイル選択を促す */
async function addSheet() {
  if (_sheets.length >= MAX_SHEETS) { showToast(`タブは最大${MAX_SHEETS}つです`); return; }
  // 現在シートを保存
  _sheets[_sheetIdx].subWinStates = _freezeSubWins();
  Object.assign(_sheets[_sheetIdx], App.saveState(), { fh: _fileHandle });
  // 現サブ窓を再展開 (addSheet はタブ切替しないので現状維持)
  _thawSubWins(_sheets[_sheetIdx].subWinStates, _sheets[_sheetIdx].pdfDoc, App.strokes);
  // 新シート
  const sh = _emptySheet();
  _sheets.push(sh);
  _sheetIdx = _sheets.length - 1;
  _fileHandle = null;
  await App.loadState(sh);
  _renderTabBar();
  openFile(); // ファイル選択 → loadPDF → _postLoadFn → _sheetSync で同期
}

/** タブを閉じる */
async function closeSheetAt(idx) {
  showLoading(true);
  if (idx === _sheetIdx) _sheets[_sheetIdx].subWinStates = _freezeSubWins();
  // pdfDoc 破棄 (メモリ解放)
  if (_sheets[idx].pdfDoc) {
    try { _sheets[idx].pdfDoc.destroy(); } catch(_) {}
    _sheets[idx].pdfDoc = null;
  }
  if (_sheets.length === 1) {
    // 最後の1枚は空にして維持
    _sheets[0] = _emptySheet();
    _sheetIdx  = 0; _fileHandle = null;
    subWindows.slice().forEach(sw => sw.close());
    await App.loadState(_sheets[0]);
  } else {
    _sheets.splice(idx, 1);
    _sheetIdx = Math.min(idx, _sheets.length - 1);
    const sh  = _sheets[_sheetIdx];
    _fileHandle = sh.fh || null;
    subWindows.slice().forEach(sw => sw.close());
    await App.loadState(sh);
    _thawSubWins(sh.subWinStates, sh.pdfDoc, App.strokes);
  }
  // PDF未選択状態になったら起動時復元キーをクリア（手動で閉じたデータを復元しない）
  if (!App.pdfDoc) await IDB.set('last', null);
  _renderTabBar();
  showLoading(false);
}

/* ============================================================
   ツール / カラー / 太さ
   ============================================================ */
function updateSwatches(mode) {
  const palette = mode === 'hl' ? HL_COLORS : PEN_COLORS;
  const active  = mode === 'hl' ? hlColor   : penColor;
  palette.forEach(p => {
    const el = document.getElementById(p.id); if (!el) return;
    el.dataset.c = p.c;
    el.style.background  = p.c;
    el.style.borderColor = p.c === active ? '#fff' : 'transparent';
    el.classList.toggle('on', p.c === active);
  });
  strokeColor = active;
}

function setTool(t) {
  if (t !== 'sub') prevTool = currentTool;
  currentTool = t;
  document.querySelectorAll('[id^="t-"]').forEach(b => b.classList.remove('on'));
  document.getElementById('t-' + t)?.classList.add('on');
  closeAllPickers();
  if (t === 'sub') return;
  updateSwatches(t === 'hl' ? 'hl' : 'pen');
  const key = t === 'shape' ? currentShape : t;
  strokeSize = toolSizes[key] || 3;
  document.getElementById('sz-v').textContent = strokeSize;
}

function setColor(el) {
  strokeColor = el.dataset.c;
  if (currentTool === 'hl') hlColor = strokeColor; else penColor = strokeColor;
  // updateSwatches 経由で再描画 → インラインstyle.borderColor と .on クラスを正しく同期
  updateSwatches(currentTool === 'hl' ? 'hl' : 'pen');
}

function pickShape(shapeName) {
  currentShape = shapeName; currentTool = 'shape';
  const LABELS = { arrow:'矢印▾', rect:'四角▾', circle:'円▾', line:'直線▾' };
  document.getElementById('t-shape').textContent = LABELS[shapeName];
  document.querySelectorAll('[id^="t-"]').forEach(b => b.classList.remove('on'));
  document.getElementById('t-shape').classList.add('on');
  document.querySelectorAll('#shapepop button').forEach(b => b.classList.remove('on'));
  document.querySelector(`#shapepop [data-shape="${shapeName}"]`)?.classList.add('on');
  closeAllPickers();
  updateSwatches('pen'); // 図形は常にペン色を使用（蛍光ペン色の影響を排除）
  strokeSize = toolSizes[shapeName] || 2;
  document.getElementById('sz-v').textContent = strokeSize;
}

function setSelMode(mode) {
  selMode = mode; currentTool = 'select';
  document.getElementById('sel-rect').classList.toggle ('on', mode === 'rect');
  document.getElementById('sel-lasso').classList.toggle('on', mode === 'lasso');
  document.querySelectorAll('[id^="t-"]').forEach(b => b.classList.remove('on'));
  document.getElementById('t-select').classList.add('on');
  closeAllPickers();
}

function togglePicker(id, btnEl) {
  const pk  = document.getElementById(id);
  const was = pk.classList.contains('on');
  closeAllPickers();
  if (!was) {
    const b = btnEl.getBoundingClientRect();
    pk.style.top  = (b.bottom + 4) + 'px';
    pk.style.left = b.left + 'px';
    pk.classList.add('on');
  }
}
function closeAllPickers() {
  document.querySelectorAll('.pkp').forEach(p => p.classList.remove('on'));
}

/* ---- 太さパネル ---- */
let szTmp = 3;
function toggleSzPanel(btnEl) {
  const p = document.getElementById('szp');
  if (p.classList.contains('on')) { p.classList.remove('on'); return; }
  const b = btnEl.getBoundingClientRect();
  p.style.top  = (b.bottom + 5) + 'px';

    pen:'ペンの太さ', hl:'蛍光ペンの太さ', eraser:'消しゴムの太さ',
    text:'文字の大きさ', arrow:'矢印の太さ', rect:'四角の太さ',
    circle:'円の太さ', line:'直線の太さ'
  };
  document.getElementById('szp-title').textContent = TITLES[key] || '太さ';
  szTmp = strokeSize;
  document.getElementById('sz-rng').value = strokeSize;
  document.getElementById('sz-n').value   = strokeSize;
  drawSzPreview(strokeSize);
  p.classList.add('on');
}
function onSzChange(v) {
  szTmp = Math.max(1, Math.min(40, parseInt(v) || 1));
  document.getElementById('sz-rng').value = szTmp;
  document.getElementById('sz-n').value   = szTmp;
  drawSzPreview(szTmp);
}
function applySz() {
  strokeSize = szTmp;
  const key = currentTool === 'shape' ? currentShape : currentTool;
  toolSizes[key] = strokeSize;
  document.getElementById('sz-v').textContent = strokeSize;
  document.getElementById('szp').classList.remove('on');
  showToast('太さ ' + strokeSize + ' に設定');
}
function drawSzPreview(sz) {
  const c   = document.getElementById('szp-cvs');
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.strokeStyle = strokeColor || '#cc2020';
  ctx.lineWidth   = Math.min(sz, c.height * 0.85);
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(14, c.height/2); ctx.lineTo(c.width-14, c.height/2); ctx.stroke();
}

function cancelTx()  { document.getElementById('txov').classList.remove('on'); }

    });

    schedSave();
