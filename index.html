  cancelTx();
}

/* ============================================================
   PDF保存
   ============================================================ */
async function _pdfOverlayPage(srcDoc, page, pageNum, strks, pw, ph) {
  const jsPage = await App.pdfDoc.getPage(pageNum);
  const vp     = jsPage.getViewport({ scale: SAVE_RS });
  const cvs    = document.createElement('canvas');
  cvs.width = vp.width; cvs.height = vp.height;
  strks.forEach(s => drawStroke(s, cvs.getContext('2d'), SAVE_RS, SAVE_RS));
  const embed  = rotateCanvas(cvs, jsPage, pw, ph, SAVE_RS);
  const blob   = await new Promise(r => embed.toBlob(r, 'image/png'));
  const img    = await srcDoc.embedPng(new Uint8Array(await blob.arrayBuffer()));
  // pdf-lib はページ左下を(0,0)とする座標系。画像はページ全体を覆うよう配置
  page.drawImage(img, { x: 0, y: 0, width: pw, height: ph, opacity: 1 });
}

async function _pdfRasterPage(srcDoc, page, pageNum, strks, pw, ph) {
  const jsPage = await App.pdfDoc.getPage(pageNum);
  const vp     = jsPage.getViewport({ scale: SAVE_RS });
  const c      = document.createElement('canvas');
  c.width = vp.width; c.height = vp.height;
  const ctx    = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, vp.width, vp.height);
  await jsPage.render({ canvasContext: ctx, viewport: vp }).promise;
  const ann    = document.createElement('canvas');
  ann.width = vp.width; ann.height = vp.height;
  _drawAnnotations(ann.getContext('2d'), strks, SAVE_RS); // ② 消しゴムは text 以外すべて対象
  ctx.drawImage(ann, 0, 0);
  const embed  = rotateCanvas(c, jsPage, pw, ph, SAVE_RS);
  const blob   = await new Promise(r => embed.toBlob(r, 'image/jpeg', 0.94));
  const img    = await srcDoc.embedJpg(new Uint8Array(await blob.arrayBuffer()));
  // 白背景で既存コンテンツを塗りつぶし、ラスタ画像（PDF+注釈）で全面置換
  page.drawRectangle({ x:0, y:0, width:pw, height:ph,
    color: window.PDFLib.rgb(1,1,1), borderWidth: 0 });
  page.drawImage(img, { x: 0, y: 0, width: pw, height: ph, opacity: 1 });
}

async function generatePDFBlob() {
  const PL = window.PDFLib;
  if (!PL) { showToast('⚠ pdf-lib 未ロード'); return _generatePDFBlobFallback(); }
  const srcDoc = await PL.PDFDocument.load(App.origBuf.slice(0));
  for (let i = 0; i < App.totalPages; i++) {
    const pn = i + 1, ss = App.strokes[pn] || [];
    if (!ss.length) continue;
    const page = srcDoc.getPage(i);
    const { width, height } = page.getSize();
    await (ss.some(s => s.type === 'eraser')
      ? _pdfRasterPage (srcDoc, page, pn, ss, width, height)
      : _pdfOverlayPage(srcDoc, page, pn, ss, width, height));
  }
  return new Blob([await srcDoc.save()], { type: 'application/pdf' });
}

async function _generatePDFBlobFallback() {
  const { jsPDF } = window.jspdf; const RS = 4;
  const pg1 = await App.pdfDoc.getPage(1);
  const vp1 = pg1.getViewport({ scale: 1 });
  const doc = new jsPDF({ unit:'pt', format:[vp1.width,vp1.height],
    orientation: vp1.width > vp1.height ? 'l' : 'p' });
  for (let i = 1; i <= App.totalPages; i++) {
    if (i > 1) {
      const pgi = await App.pdfDoc.getPage(i);
      const vpi = pgi.getViewport({ scale: 1 });
      doc.addPage([vpi.width, vpi.height], vpi.width > vpi.height ? 'l' : 'p');
    }
    const pg = await App.pdfDoc.getPage(i);
    const vp = pg.getViewport({ scale: RS });
    const c  = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, vp.width, vp.height);
    await pg.render({ canvasContext: ctx, viewport: vp }).promise;
    const ann = document.createElement('canvas'); ann.width = vp.width; ann.height = vp.height;
    (App.strokes[i] || []).forEach(s => drawStroke(s, ann.getContext('2d'), RS));
    ctx.drawImage(ann, 0, 0);
    doc.addImage(c.toDataURL('image/jpeg', 0.94), 'JPEG', 0, 0, vp.width/RS, vp.height/RS);
  }
  return doc.output('blob');
}

/** ③ PDF出力ボタン → ページ指定ダイアログを表示 */
function savePDF() {
  if (!App.pdfDoc) { showToast('PDFが開かれていません'); return; }
  document.getElementById('pgrov').classList.add('on');
  document.getElementById('pgrfld').value       = '';
  document.getElementById('pgrfld').placeholder = `全ページ / 例: 1, 1-${App.totalPages}, 1,3`;
}

/** ③ ページ範囲文字列をページ番号配列に変換
 *  対応形式: "" / "全ページ" / "1" / "1-5" / "1,3,5" / "1-3,8,10-12"
 */
function _parsePageRange(input, total) {
  const s = (input || '').trim();
  if (!s || s === '全ページ') return Array.from({ length: total }, (_, i) => i + 1);
  const pages = new Set();
  s.split(',').forEach(part => {
    const t = part.trim();
    if (/^\d+$/.test(t)) {
      pages.add(parseInt(t));
    } else if (/^(\d+)-(\d+)$/.test(t)) {
      const [, a, b] = t.match(/^(\d+)-(\d+)$/);
      for (let i = parseInt(a); i <= parseInt(b); i++) pages.add(i);
    }
  });
  return [...pages].filter(p => p >= 1 && p <= total).sort((a, b) => a - b);
}

/** ③ 指定ページのみ出力する PDF を生成 */
async function _generateSubsetPDF(pageNums) {
  const PL = window.PDFLib;
  if (!PL) { showToast('⚠ pdf-lib 未ロード'); return null; }
  const srcDoc = await PL.PDFDocument.load(App.origBuf.slice(0));
  for (const pn of pageNums) {
    const ss = App.strokes[pn] || [];
    if (!ss.length) continue;
    const page = srcDoc.getPage(pn - 1);
    const { width, height } = page.getSize();
    await (ss.some(s => s.type === 'eraser')
      ? _pdfRasterPage(srcDoc, page, pn, ss, width, height)
      : _pdfOverlayPage(srcDoc, page, pn, ss, width, height));
  }
  const newDoc = await PL.PDFDocument.create();
  const indices = pageNums.map(n => n - 1);
  const copied  = await newDoc.copyPages(srcDoc, indices);
  copied.forEach((p, i) => {
    newDoc.addPage(p);
    // copyPages が Rotate メタデータを保持しない場合に備えて明示的に再設定
    try {
      const srcPage = srcDoc.getPage(indices[i]);
      const rotAngle = srcPage.getRotation()?.angle ?? 0;
      if (rotAngle) p.setRotation(PL.degrees(rotAngle));
    } catch(_) {}
  });
  return new Blob([await newDoc.save()], { type: 'application/pdf' });
}

/** ③ 実際のPDF出力処理（ダイアログ確定後に呼ぶ） */
async function _executeSave(rangeStr) {
  document.getElementById('pgrov').classList.remove('on');
  if (!App.pdfDoc) return;
  showLoading(true);
  try {
    const pages = _parsePageRange(rangeStr, App.totalPages);
    if (!pages.length) { showToast('有効なページがありません'); showLoading(false); return; }
    const isAll = pages.length === App.totalPages;
    // 全ページ・部分ページとも _generateSubsetPDF で統一（コードパスを単一化して安定化）
    const blob  = await _generateSubsetPDF(pages);
    if (!blob) { showLoading(false); return; }
    const suffix = isAll ? '' : '_p' + rangeStr.replace(/\s/g, '');
    const fname  = (App.fileName || 'drawing.pdf').replace(/\.pdf$/i, '') + suffix + '.pdf';
    if (_fileHandle && isAll) {
      try {
        const w = await _fileHandle.createWritable();
        await w.write(blob); await w.close();
        showToast('📤 PDF出力しました'); showLoading(false); return;
      } catch(e) { console.warn('write:', e); }
    }
    if (window.showSaveFilePicker) {
      try {
        const fh = await window.showSaveFilePicker({
          suggestedName: fname,
          types: [{ description:'PDF', accept:{'application/pdf':['.pdf']} }]
        });
        if (isAll) _fileHandle = fh;
        const w = await fh.createWritable(); await w.write(blob); await w.close();
        showToast('📤 PDF出力しました'); showLoading(false); return;
      } catch(e) { if (e.name === 'AbortError') { showLoading(false); return; } }
    }
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.download = fname; a.href = url; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 60000);
    showToast('📤 PDF出力: ' + fname);
  } catch(e) { showToast('出力失敗: ' + e.message); console.error(e); }
  showLoading(false);
}

/* ============================================================
   計算機
   ============================================================ */
let calcExpr = '', calcOper = '', calcVal = '', calcJustEq = false;
const calcHistory = [];

function calcDecPlaces() { return Math.max(0, parseInt(document.getElementById('cdec').value) || 0); }

/* --- [FIX-CALC] 安全性・精度強化ユーティリティ --- */

/** 全角数字・記号→半角変換 */
function _calcNorm(s) {
  return String(s)
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[．]/g, '.').trim();
}

/** 安全な数値変換: 無効値・空文字は null を返す (|| 0 による誤魔化しを排除) */
function _safeNum(s) {
  const norm = _calcNorm(String(s));
  if (norm === '') return null;          // [FIX-CALC] 空文字→null (Numberは0を返すため明示ガード)
  const n = Number(norm);
  return Number.isFinite(n) ? n : null;
}

/** 浮動小数点ノイズ除去 + 表示桁丸め (toPrecision(14) で mm単位精度を確保) */
function _calcFmt(n, places) {
  const cleaned = parseFloat(n.toPrecision(14));
  return String(+cleaned.toFixed(places));
}

/** エラー状態か判定 */
function _isErr(v) { return v === 'エラー' || v === '÷0エラー'; }

/** 演算実行: ゼロ除算は null を返す (旧: 0 返却バグを修正) */
function _calcCompute(a, op, b) {
  if (op === '+') return a + b;
  if (op === '-') return a - b;
  if (op === '*') return a * b;
  if (op === '/') return b === 0 ? null : a / b; // [FIX-CALC] ゼロ除算→null
  return a;
}

/** 履歴DOM更新 */
function _calcUpdateHist() {
  document.getElementById('chist').innerHTML =
    calcHistory.map(h => `<div class="chi">${h}</div>`).join('');
}

/** calcExpr の先頭数値部分を取得 (末尾の演算子記号を除去) */
function _calcGetA() { return _safeNum(calcExpr.replace(/[÷×＋−]$/, '').trim()); }

/** エラー設定 (メッセージ + 状態リセット) */
function _calcSetError(msg) {
  calcHistory.unshift(msg);
  if (calcHistory.length > 20) calcHistory.pop();
  _calcUpdateHist();
  calcExpr = ''; calcVal = 'エラー'; calcOper = ''; calcJustEq = true;
}

/* --- 表示更新 --- */
function calcDisplay() {
  document.getElementById('cexpr').textContent = calcExpr;
  const el = document.getElementById('cval');
  el.textContent = calcVal || '0';
  el.style.color = _isErr(calcVal) ? '#ff6060' : ''; // [FIX-CALC] エラー時に赤表示
}

/* --- 数値ボタン --- */
function calcNum(n) {
  if (_isErr(calcVal)) return;                         // [FIX-CALC] エラー中は入力ブロック
  if (calcJustEq) { calcVal = ''; calcExpr = ''; calcJustEq = false; }
  n = _calcNorm(n);                                    // [FIX-CALC] 全角正規化
  if (n === '.' && calcVal.includes('.')) return;
  if (n === '.' && calcVal === '') calcVal = '0';      // 先頭ドット補完
  calcVal += n; calcDisplay();
}

/* --- 演算子ボタン --- */
function calcOp(op) {
  if (_isErr(calcVal)) return;                         // [FIX-CALC] エラー中はブロック
  calcJustEq = false;
  if (calcVal !== '' && calcOper !== '') {
    const a = _calcGetA(), b = _safeNum(calcVal);      // [FIX-CALC] 安全パース
    if (a === null || b === null) { _calcSetError('入力エラー'); calcDisplay(); return; }
    const r = _calcCompute(a, calcOper, b);
    if (r === null) { _calcSetError(calcExpr + calcVal + ' = ÷0エラー'); calcDisplay(); return; }
    calcVal = _calcFmt(r, calcDecPlaces());             // [FIX-CALC] 高精度フォーマット
  }
  const OP_SYMBOLS = { '+': '＋', '-': '−', '*': '×', '/': '÷' };
  calcExpr = (calcVal || '0') + OP_SYMBOLS[op];
  calcOper = op; calcVal = ''; calcDisplay();
}

/* --- イコール --- */
function calcEq() {
  if (!calcOper || calcVal === '' || _isErr(calcVal)) return;
  const a = _calcGetA(), b = _safeNum(calcVal);        // [FIX-CALC] 安全パース
  if (a === null || b === null) { _calcSetError('入力エラー'); calcDisplay(); return; }
  const r = _calcCompute(a, calcOper, b);
  if (r === null) {                                    // [FIX-CALC] ゼロ除算→エラー表示
    _calcSetError(calcExpr + calcVal + ' = ÷0エラー');
    calcDisplay(); return;
  }
  const rs = _calcFmt(r, calcDecPlaces());             // [FIX-CALC] 高精度フォーマット
  calcHistory.unshift(calcExpr + calcVal + ' = ' + rs);
  if (calcHistory.length > 20) calcHistory.pop();
  _calcUpdateHist();
  calcExpr = calcExpr + calcVal + '='; calcVal = rs;
  calcOper = ''; calcJustEq = true; calcDisplay();
}

/* --- 特殊ボタン --- */
function calcFn(f) {
  if (f === 'C') {
    calcExpr = ''; calcVal = ''; calcOper = ''; calcJustEq = false;
  } else if (f === '±') {
    if (!calcVal || _isErr(calcVal)) return;
    const n = _safeNum(calcVal); if (n === null) return; // [FIX-CALC] 安全パース
    calcVal = String(-n);
  } else if (f === '%') {
    if (!calcVal || _isErr(calcVal)) return;
    const n = _safeNum(calcVal); if (n === null) return; // [FIX-CALC] 安全パース
    calcVal = String(parseFloat((n / 100).toPrecision(14))); // [FIX-CALC] 精度保持
  } else if (f === '⌫') {
    if (_isErr(calcVal)) { calcVal = ''; }              // [FIX-CALC] エラー→クリア
    else calcVal = calcVal.length > 1 ? calcVal.slice(0, -1) : '';
  } else if (f === 'sqrt') {
    if (!calcVal || _isErr(calcVal)) return;
    const n = _safeNum(calcVal); if (n === null) return; // [FIX-CALC] 安全パース
    calcVal = n < 0 ? 'エラー' : _calcFmt(Math.sqrt(n), calcDecPlaces());
  } else if (f === 'sq') {
    if (!calcVal || _isErr(calcVal)) return;
    const n = _safeNum(calcVal); if (n === null) return; // [FIX-CALC] 安全パース
    calcVal = _calcFmt(n * n, calcDecPlaces());
  } else if (f === '=') {
    calcEq(); return;
  }
  calcDisplay();
}

function toggleCalc() {
  const el = document.getElementById('calc');
  el.classList.toggle('on');
  document.getElementById('calcbtn').classList.toggle('on', el.classList.contains('on'));

/* 計算機ドラッグ */
(() => {
  const el = document.getElementById('calc');
  let dragging = false, ox = 0, oy = 0, ex = 0, ey = 0;
  const onStart = e => {
    if (e.target.closest('#cclose')) return;
    const s = e.touches ? e.touches[0] : e;
    dragging = true; ox = s.clientX; oy = s.clientY;
    const r = el.getBoundingClientRect(); ex = r.left; ey = r.top;
    if (e.cancelable) e.preventDefault(); e.stopPropagation();
  };
  const onMove = e => {
    if (!dragging) return;
    const s = e.touches ? e.touches[0] : e;
    el.style.left   = (ex + s.clientX - ox) + 'px';
    el.style.top    = (ey + s.clientY - oy) + 'px';
    el.style.bottom = 'auto'; el.style.right = 'auto';
  };
  const onEnd = () => { dragging = false; };
  document.getElementById('ctb').addEventListener('touchstart', onStart, { passive: false });
  document.getElementById('ctb').addEventListener('mousedown',  onStart);
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchend',  onEnd);
  document.addEventListener('mouseup',   onEnd);
})();

   ============================================================ */
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('on'), 2800);
}
function showLoading(visible) {
  document.getElementById('loading').classList.toggle('on', visible);
}
